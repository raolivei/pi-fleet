name: "Terraform"

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Cloudflare
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_origin_ca_key: ${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_pitanga_cloud_zone_id: ${{ vars.PITANGA_CLOUD_ZONE_ID }}
  TF_VAR_swimto_app_zone_id: ${{ vars.SWIMTO_APP_ZONE_ID }}
  TF_VAR_raolivei_me_zone_id: ${{ vars.RAOLIVEI_ME_ZONE_ID }}
  TF_VAR_public_ip: ${{ secrets.PUBLIC_IP }}
  # Skip k3s (managed by Ansible)
  TF_VAR_skip_k3s_resources: "true"
  # Vault: use local dev server started in CI (see "Start Vault" step)
  # This prevents the Vault provider plugin from crashing and keeps
  # vault_enabled=true so existing vault resources aren't planned for destruction
  TF_VAR_skip_vault_resources: "false"
  TF_VAR_vault_token: "ci-root"
  TF_VAR_vault_address: "http://127.0.0.1:8200"
  TF_VAR_kubeconfig_path: "~/.kube/config-eldertree"
  TF_VAR_pi_user: ${{ secrets.PI_USER }}

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    services:
      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: ci-root
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
        ports:
          - 8200:8200
        options: >-
          --cap-add=IPC_LOCK

    defaults:
      run:
        shell: bash
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          # 1.6.x fails provider install with openpgp: key expired (HashiCorp key rotation)
          terraform_version: 1.10.0
          # Default wrapper breaks `terraform plan -detailed-exitcode` (returns 0 when changes exist)
          terraform_wrapper: false
          cli_config_credentials_hostname: app.terraform.io
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # Pre-configure Vault dev server with backends that exist in TF state
      # so the provider doesn't crash during PlanResourceChange calls
      - name: Configure Vault Dev Server
        run: |
          # Wait for Vault to be ready
          for i in 1 2 3 4 5; do
            curl -sf http://127.0.0.1:8200/v1/sys/health && break
            echo "Waiting for Vault... ($i)"
            sleep 2
          done
          # Enable kubernetes auth backend (kv-v2 at secret/ is default in dev)
          curl -sf --header "X-Vault-Token: ci-root" \
            --request POST \
            --data '{"type":"kubernetes"}' \
            http://127.0.0.1:8200/v1/sys/auth/kubernetes || true
        working-directory: .

      - name: Terraform Init
        run: terraform init -input=false

      # Redirect to file (not pipe) to avoid EPIPE when piping terraform output
      - name: Verify Remote State
        id: remote_state
        run: |
          if terraform state list > state-list.txt 2>&1; then
            STATE_COUNT=$(wc -l < state-list.txt | tr -d ' ')
            echo "$STATE_COUNT" > .ci-state-count.txt
            echo "count=$STATE_COUNT" >> "$GITHUB_OUTPUT"
            echo "✅ Remote state: $STATE_COUNT resources"
            head -20 state-list.txt
            [ "$STATE_COUNT" -gt 20 ] && echo "... and $((STATE_COUNT - 20)) more"
            if [ "$STATE_COUNT" -eq "0" ]; then
              echo "❌ State is empty"
              echo "::error title=Terraform state::Remote state is empty; nothing to plan against."
              exit 1
            fi
            echo "::notice title=Remote state::Terraform state list has ${STATE_COUNT} address(es) (not empty)."
          else
            echo "❌ Could not access remote state"
            echo "::error title=Terraform state::terraform state list failed. Check init and backend auth."
            cat state-list.txt 2>/dev/null || true
            exit 1
          fi
          rm -f state-list.txt

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      # -refresh=false: use cached state, don't refresh from providers
      # Vault dev server satisfies provider init; -refresh=false avoids state drift
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -refresh=false -detailed-exitcode > plan-output.txt 2>&1
          PLAN_EXIT_CODE=$?
          set -e
          echo "exitcode=$PLAN_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$PLAN_EXIT_CODE" > plan-exitcode.txt
          cat plan-output.txt
          echo ""
          if [ $PLAN_EXIT_CODE -eq 0 ]; then
            echo "✅ No changes needed"
          elif [ $PLAN_EXIT_CODE -eq 2 ]; then
            echo "✅ Changes detected"
            grep -A 5 "Plan:" plan-output.txt || true
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "ℹ️ Apply runs only on push to main or workflow_dispatch (apply=true); PRs are plan-only."
            fi
          else
            echo "❌ Plan failed (exit code $PLAN_EXIT_CODE)"
            ERR_SNIP=$(head -c 400 < plan-output.txt | tr '\n' ' ' | tr -d '\r')
            echo "::error title=Terraform plan failed (exit $PLAN_EXIT_CODE)::$ERR_SNIP"
            exit 1
          fi
          PLAN_LINE=$(grep -E 'Plan:.*[0-9]+ to (add|change|destroy)' plan-output.txt 2>/dev/null | tail -1 | tr -d '\r' | sed 's/^[[:space:]]*//') || true
          if [ -n "$PLAN_LINE" ]; then
            echo "::notice title=Terraform plan::$PLAN_LINE"
          fi

      - name: Terraform Apply
        id: apply
        if: |
          steps.plan.outcome == 'success' &&
          (
            (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true')
          )
        run: terraform apply -auto-approve -input=false -refresh=false

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Terraform run summary"
            echo ""
            echo "- **\`terraform apply\` (this job):** ${{ steps.apply.conclusion }} (skipped = conditions not met or an earlier step failed before apply.)"
            if [ -f .ci-state-count.txt ]; then
              SC=$(tr -d ' \n' < .ci-state-count.txt)
              echo "- **State addresses in remote backend:** $SC"
            else
              echo "- **State addresses in remote backend:** (unavailable; list step may have failed.)"
            fi
            if [ -f plan-exitcode.txt ]; then
              PE=$(tr -d ' \n' < plan-exitcode.txt)
              case "$PE" in
                0) echo "- **\`terraform plan\` exit code:** 0 (no change)" ;;
                1) echo "- **\`terraform plan\` exit code:** 1 (error) — see Terraform Plan step log" ;;
                2) echo "- **\`terraform plan\` exit code:** 2 (changes present)" ;;
                *) echo "- **\`terraform plan\` exit code:** $PE" ;;
              esac
            else
              echo "- **\`terraform plan\` exit code:** (no plan; a prior step may have failed or been skipped.)"
            fi
            if [ -f plan-output.txt ] && [ -n "$(head -1 plan-output.txt 2>/dev/null)" ]; then
              PLINE=$(grep -E 'Plan:.*[0-9]+ to (add|change|destroy)' plan-output.txt 2>/dev/null | tail -1 | tr -d '\r' | sed 's/^[[:space:]]*//') || true
              if [ -n "$PLINE" ]; then
                echo "- **Plan result line:** $PLINE"
              fi
            fi
            echo "- **Event / ref:** \`${{ github.event_name }}\` · \`${{ github.ref }}\`"
            if [ -d .terraform ] && terraform output -json &>/dev/null; then
              echo ""
              echo "### Root module output names (values not printed; many are sensitive)"
              echo ""
              echo "\`\`\`"
              terraform output -json | jq -r 'keys[]' 2>/dev/null | sort | head -40 || true
              echo "\`\`\`"
              CNT=$(terraform output -json | jq 'keys | length' 2>/dev/null) || CNT=0
              echo ""
              echo "(**$CNT** output(s).)"
            else
              echo ""
              echo "*(\`terraform output\` skipped — no initialized workspace in this run.)*"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=terraform apply::conclusion=${{ steps.apply.conclusion || 'n/a' }}"
