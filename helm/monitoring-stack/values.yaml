# Monitoring Stack Values

# Global configuration
global:
  domain: eldertree.local
  clusterIssuer: ca-cluster-issuer

# Prometheus configuration
# - Static scrape: Traefik, blackbox, postgres/redis (values `scrapeConfigs`); Vault (`scrapeConfigFiles` + volume mounts; see `clusters/eldertree/observability/vault-scrape-config.yaml`).
# - `prometheus.io/*` on Services for in-cluster app /metrics.
prometheus:
  enabled: true
  alertmanager:
    enabled: true
    persistentVolume:
      enabled: true
      size: 1Gi
      storageClass: local-path
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: alertmanager.eldertree.local
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: alertmanager-tls
          hosts:
            - alertmanager.eldertree.local
      annotations:
        cert-manager.io/cluster-issuer: ca-cluster-issuer
  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    extraArgs:
      - --collector.systemd
      - --collector.systemd.unit-include=watchdog.service
  pushgateway:
    enabled: true
    persistentVolume:
      enabled: false
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - pushgateway.eldertree.local
      tls:
        - secretName: pushgateway-tls
          hosts:
            - pushgateway.eldertree.local
      annotations:
        cert-manager.io/cluster-issuer: ca-cluster-issuer
  kube-state-metrics:
    enabled: true
    fullnameOverride: "monitoring-stack-kube-state-metrics"
    serviceAccount:
      create: true
      name: monitoring-stack-kube-state-metrics
  server:
    persistentVolume:
      enabled: true
      size: 8Gi
      storageClass: local-path
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - prometheus.eldertree.local
      tls:
        - secretName: prometheus-tls
          hosts:
            - prometheus.eldertree.local
      annotations:
        cert-manager.io/cluster-issuer: ca-cluster-issuer
    global:
      # 60s: halves scrape load vs 30s (RAM/CPU) on Pi; coarser resolution for triage
      scrape_interval: 60s
      scrape_timeout: 10s
      evaluation_interval: 60s
    # ServiceMonitor and PodMonitor discovery
    serviceMonitorSelectorNilUsesAll: true
    podMonitorSelectorNilUsesAll: true
    # Extra scrape fragments (prometheus chart 28+): `scrape_config_files` in prometheus.yml
    # (see also clusters/eldertree/observability/*-scrape-config.yaml).
    # IMPORTANT: mount at /etc/scrape-configs/, NOT under /etc/config/. The kubelet creates
    # empty placeholder directories inside the config-volume backing store for any subPath mount
    # that targets a path under /etc/config/. runc then fails to bind-mount the file over that
    # directory (MS_BIND|MS_REC on a file-to-directory pair → ENOTDIR). Using a separate directory
    # avoids the collision entirely. See pi-fleet CHANGELOG for details.
    extraConfigmapMounts:
      - name: vault-scrape-file
        configMap: vault-scrape-config
        subPath: vault-scrape.yaml
        mountPath: /etc/scrape-configs/vault-scrape.yaml
        readOnly: true
  scrapeConfigFiles:
    - /etc/scrape-configs/vault-scrape.yaml
  # Scrape config map: merges with chart defaults (prometheus-community >=28). Static jobs:
  # postgres, redis, blackbox (×2), traefik. Node/cadvisor: Lens "node" relabel + cAdvisor labeldrop.
  scrapeConfigs:
    kubernetes-nodes:
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/$1/proxy/metrics
        - source_labels: [__meta_kubernetes_node_name]
          target_label: node
    kubernetes-nodes-cadvisor:
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
        - source_labels: [__meta_kubernetes_node_name]
          target_label: node
      # Drop cAdvisor label dimensions with extreme cardinality; dashboards use
      # namespace, pod, container (see DASHBOARDS — Prometheus TSDB & memory).
      metric_relabel_configs:
        - action: labeldrop
          regex: (id|image)
    postgres-exporter:
      static_configs:
        - targets: ["postgres-exporter.observability.svc.cluster.local:9187"]
      scrape_interval: 60s
    redis-exporter:
      static_configs:
        - targets:
            - redis://swimto-redis.swimto.svc.cluster.local:6379
            - redis://canopy-redis.canopy.svc.cluster.local:6379
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: redis-exporter.observability.svc.cluster.local:9121
      scrape_interval: 60s
    # Blackbox: HTTPS probes (exporter in cluster; see observability/blackbox-*.yaml)
    blackbox-https:
      metrics_path: /probe
      params:
        module: [http_2xx]
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.observability.svc.cluster.local:9115
      static_configs:
        - targets:
            - "https://swimto.eldertree.xyz"
            - "https://swimto.app"
            - "https://api.swimto.app/health"
            - "https://pitanga.cloud"
    blackbox-https-ca:
      metrics_path: /probe
      params:
        module: [http_2xx_insecure]
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.observability.svc.cluster.local:9115
      static_configs:
        - targets:
            - "https://grafana.eldertree.local"
            - "https://prometheus.eldertree.local"
            - "https://alertmanager.eldertree.local"
    # Traefik: metrics entrypoint (port 9100); Service must expose the port.
    traefik:
      scrape_interval: 60s
      scrape_timeout: 10s
      static_configs:
        - targets: ["traefik.kube-system.svc.cluster.local:9100"]
          labels:
            app: traefik
            namespace: kube-system
  # Alertmanager configuration
  serverFiles:
    alerting_rules.yml:
      groups:
        - name: node-alerts
          rules:
            - alert: NodeDown
              expr: up{job="kubernetes-nodes"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Node {{ $labels.instance }} is down"
                description: "Node {{ $labels.instance }} has been unreachable for more than 2 minutes."
            - alert: HighCPUUsage
              expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High CPU usage on {{ $labels.instance }}"
                description: "CPU usage is above 85% on {{ $labels.instance }} for more than 5 minutes."
            - alert: HighMemoryUsage
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High memory usage on {{ $labels.instance }}"
                description: "Memory usage is above 90% on {{ $labels.instance }} for more than 5 minutes."
            - alert: HighNodeTemperature
              expr: node_hwmon_temp_celsius > 75
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High temperature on {{ $labels.instance }}"
                description: "Temperature is above 75°C on {{ $labels.instance }}."
            - alert: NodeUnexpectedReboot
              expr: changes(node_boot_time_seconds[10m]) > 0
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Node {{ $labels.instance }} rebooted unexpectedly"
                description: "Node {{ $labels.instance }} boot time changed, indicating a reboot. Check watchdog logs and system journals."
            - alert: NodeHighMemoryPressure
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
              for: 3m
              labels:
                severity: warning
              annotations:
                summary: "Node {{ $labels.instance }} memory pressure >95%"
                description: "Node is approaching OOM ({{ printf \"%.1f\" $value }}% used). Investigate memory-hungry pods."
            - alert: NodeOOMKill
              expr: increase(node_vmstat_oom_kill[5m]) > 0
              for: 0m
              labels:
                severity: critical
              annotations:
                summary: "OOM kill detected on {{ $labels.instance }}"
                description: "{{ $labels.instance }} killed {{ $value }} process(es) due to out-of-memory. Check pod memory limits and node capacity."
            - alert: WatchdogServiceDown
              expr: node_systemd_unit_state{name="watchdog.service",state="active"} != 1
              for: 3m
              labels:
                severity: critical
              annotations:
                summary: "Watchdog service not active on {{ $labels.instance }}"
                description: "watchdog.service is not active on {{ $labels.instance }}. Hardware watchdog may not be armed — run scripts/verify-watchdog.sh."
            - alert: NodePingableButNotReady
              expr: |
                (
                  (kube_node_status_condition{condition="Ready",status="true",node="node-1.eldertree.local"} == 0
                   and up{instance="10.0.0.1:9100"} == 1)
                  or
                  (kube_node_status_condition{condition="Ready",status="true",node="node-2.eldertree.local"} == 0
                   and up{instance="10.0.0.2:9100"} == 1)
                  or
                  (kube_node_status_condition{condition="Ready",status="true",node="node-3.eldertree.local"} == 0
                   and up{instance="10.0.0.3:9100"} == 1)
                )
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Node {{ $labels.node }} metrics up but NotReady"
                description: "node-exporter is reachable but the node is NotReady for 5m — possible freeze (ICMP up, kubelet dead). Check watchdog and journalctl."
        - name: kubernetes-alerts
          rules:
            - alert: PodCrashLooping
              expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
                description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted more than 5 times in the last hour."
            - alert: PodNotReady
              expr: kube_pod_status_ready{condition="true"} == 0
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
                description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for more than 10 minutes."
            - alert: DeploymentReplicasMismatch
              expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
                description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not matched the expected number of replicas for 10 minutes."
        - name: storage-alerts
          rules:
            - alert: PVCAlmostFull
              expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is almost full"
                description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ printf \"%.0f\" $value }}% full."
            - alert: DiskSpaceLow
              expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Low disk space on {{ $labels.instance }}"
                description: "Disk space is below 15% on {{ $labels.instance }}."
        - name: swimto-alerts
          rules:
            - alert: SwimTOApiReplicasUnavailable
              expr: |
                kube_deployment_status_replicas_available{
                  namespace="swimto", deployment="swimto-api"
                } < 1
              for: 2m
              labels:
                severity: critical
                app: swimto
              annotations:
                summary: "SwimTO API has no ready replicas"
                description: "swimto-api available replicas < 1 for 2m — schedule/map on swimto.app will show 503. Check node-1 reboots and pod placement on stable nodes."
            - alert: SwimTOWebReplicasUnavailable
              expr: |
                kube_deployment_status_replicas_available{
                  namespace="swimto", deployment="swimto-web"
                } < 1
              for: 2m
              labels:
                severity: critical
                app: swimto
              annotations:
                summary: "SwimTO web has no ready replicas"
                description: "swimto-web available replicas < 1 for 2m — swimto.app may be unreachable."
            - alert: SwimTOApiOnUnstableNode
              expr: |
                count(
                  kube_pod_info{
                    namespace="swimto",
                    pod=~"swimto-api-.*",
                    node="node-1.eldertree.local"
                  }
                ) > 0
              for: 5m
              labels:
                severity: warning
                app: swimto
              annotations:
                summary: "SwimTO API pod scheduled on node-1 (unstable tier)"
                description: "swimto-api is running on node-1 despite unstable tier policy — reschedule or fix affinity/KEDA."
        - name: blackbox-alerts
          rules:
            - alert: BlackboxProbeFailing
              expr: probe_success{job=~"blackbox-.*"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Blackbox probe failing: {{ $labels.instance }}"
                description: "The HTTPS blackbox check returned probe_success=0 (target unreachable or bad response) for 5+ minutes. URL: {{ $labels.instance }}."
            - alert: SwimTOApiPublicProbeFailing
              expr: probe_success{job="blackbox-https", instance="https://api.swimto.app/health"} == 0
              for: 2m
              labels:
                severity: critical
                app: swimto
              annotations:
                summary: "SwimTO public API health probe failing"
                description: "Blackbox cannot reach https://api.swimto.app/health — users see 503 on schedule/map."

# Grafana configuration
grafana:
  enabled: true
  # Admin password from Vault (synced to Kubernetes secret: monitoring/grafana-admin)
  admin:
    existingSecret: grafana-admin
    secretKey: admin-password
  # Fallback password (used if secret doesn't exist)
  adminPassword: admin
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: local-path
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-stack-prometheus-server.observability.svc.cluster.local
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki.observability.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 500
  # Only watch `observability` — `ALL` imports every `grafana_dashboard: "1"` ConfigMap
  # cluster-wide (Kong, Veeam, third-party charts), which clutters Grafana and looks like a breach.
  # Per-dashboard Grafana folders: basename (no .json) -> folder path. Sidecar uses annotation `grafana_folder`.
  # See: https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml (sidecar.dashboards.folderAnnotation)
  #
  # Dashboard folder organization (Applications/* for products, Platform/* for infrastructure)
  # Add your dashboard JSON to dashboards/ directory, then map its basename here.
  # Missing mappings default to "Platform" folder.
  #
  # To add a new dashboard:
  #   1. Create dashboards/my-dashboard.json (ensure uid matches filename)
  #   2. Add mapping below: my-dashboard: "Category/Subcategory"
  #   3. Validate: scripts/validate-dashboards.sh
  #   4. Deploy: helm upgrade monitoring-stack .
  #
  # See: README-DASHBOARDS.md for complete documentation
  dashboardFolders:
    # —— Applications (one subfolder per app; multiple JSON can share the same path) ——
    swimto-dashboard: "Applications/SwimTO"
    bolao-dashboard: "Applications/Bolao"
    pitanga-dashboard: "Applications/Pitanga"
    ollie-dashboard: "Applications/Ollie"
    # —— Platform (cluster, capacity, network, security) ——
    eldertree-ops-home: "Platform/Overview"
    command-center: "Platform/Overview"
    eldertree-cluster: "Platform/Cluster"
    kubernetes-workloads: "Platform/Workloads"
    namespace-resources: "Platform/Capacity"
    network-intelligence: "Platform/Network"
    hardware-health: "Platform/Hardware"
    vault-dashboard: "Platform/Security"
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: observability
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      # ===================
      # KUBERNETES OVERVIEW
      # ===================
      # Comprehensive Kubernetes cluster monitoring
      k8s-views-global:
        gnetId: 15757
        revision: 37
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15758
        revision: 34
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15759
        revision: 28
        datasource: Prometheus
      # API server health (critical for HA)
      k8s-apiserver:
        gnetId: 12006
        revision: 1
        datasource: Prometheus
      # Persistent volumes
      k8s-persistent-volumes:
        gnetId: 13646
        revision: 2
        datasource: Prometheus
      # Resource usage by namespace
      k8s-compute-resources-namespace:
        gnetId: 15661
        revision: 1
        datasource: Prometheus
      # Resource usage by pod
      k8s-compute-resources-pod:
        gnetId: 15662
        revision: 1
        datasource: Prometheus
      # ===================
      # NODE & HARDWARE
      # ===================
      # Node monitoring with enhanced metrics
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      # ===================
      # NETWORKING & DNS
      # ===================
      # Traefik ingress monitoring
      traefik:
        gnetId: 11462
        revision: 1
        datasource: Prometheus
      # CoreDNS monitoring (k3s DNS)
      coredns:
        gnetId: 14981
        revision: 2
        datasource: Prometheus
      # ===================
      # GITOPS & SECRETS
      # ===================
      # Flux GitOps monitoring
      flux-cluster:
        gnetId: 15991
        revision: 1
        datasource: Prometheus
      # Cert-manager TLS monitoring
      cert-manager:
        gnetId: 11001
        revision: 1
        datasource: Prometheus
      # External Secrets (Vault sync)
      external-secrets:
        gnetId: 15159
        revision: 1
        datasource: Prometheus
      # ===================
      # HA CLUSTER HEALTH
      # ===================
      # etcd cluster health (critical for HA)
      etcd:
        gnetId: 3070
        revision: 3
        datasource: Prometheus
      # Vault HA monitoring
      vault:
        gnetId: 12904
        revision: 2
        datasource: Prometheus
      # ===================
      # DATABASES
      # ===================
      # PostgreSQL monitoring
      postgresql-database:
        gnetId: 9628
        revision: 7
        datasource: Prometheus
      # Redis monitoring
      redis:
        gnetId: 763
        revision: 6
        datasource: Prometheus
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.eldertree.local
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.eldertree.local
    annotations:
      cert-manager.io/cluster-issuer: ca-cluster-issuer
