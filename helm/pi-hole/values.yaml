image:
  pihole:
    repository: pihole/pihole
    tag: latest
    pullPolicy: Always
  bind:
    repository: ubuntu/bind9
    tag: latest
    pullPolicy: Always
  busybox:
    repository: busybox
    tag: latest
    pullPolicy: Always
  exporter:
    repository: ekofr/pihole-exporter
    tag: latest
    pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  # NOTE: loadBalancerClass removed because kube-vip v0.8.3 ignores services with this field.
  # K3s ServiceLB should be disabled cluster-wide (--disable servicelb in k3s install) to prevent conflicts.
  # kube-vip will assign this IP via the kube-vip.io/loadbalancerIPs annotation
  # This IP should be configured as the DNS server on your router
  loadBalancerIP: 192.168.2.201
  dnsUdpPort: 53
  dnsTcpPort: 53
  bindUdpPort: 5353
  bindTcpPort: 5353
  httpPort: 80
  httpsPort: 443
  metricsPort: 9617
  # NodePort values - K3s auto-allocates these for LoadBalancer services.
  # They serve as a fallback if the LoadBalancer VIP is unreachable.
  dnsNodePort: 30053
  httpNodePort: 30080
  httpsNodePort: 30443

persistence:
  enabled: false
  size: 2Gi
  storageClass: local-path

replicas: 1
strategy: RollingUpdate

config:
  timezone: UTC
  virtualHost: pihole.eldertree.local
  dns1: 1.1.1.1
  dns2: 1.0.0.1
  # The IP address for eldertree.local records
  clusterIP: 192.168.2.201

resources:
  pihole:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  bind:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  exporter:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
