---
# Disable K3s ServiceLB to allow kube-vip to manage LoadBalancer services
- name: Disable K3s ServiceLB
  hosts: raspberry_pi
  become: true
  serial: 1
  tasks:
    - name: Check if servicelb is already disabled
      shell: grep -q '\--disable servicelb' /etc/systemd/system/k3s.service
      register: servicelb_check
      failed_when: false
      changed_when: false

    - name: Backup k3s service file
      copy:
        src: /etc/systemd/system/k3s.service
        dest: /etc/systemd/system/k3s.service.backup
        remote_src: true
      when: servicelb_check.rc != 0

    - name: Add --disable servicelb flag
      shell: |
        sed -i.bak '/^ExecStart=/ s/$/ --disable servicelb/' /etc/systemd/system/k3s.service
      when: servicelb_check.rc != 0
      register: service_modified

    - name: Reload systemd and restart k3s
      systemd:
        name: k3s
        state: restarted
        daemon_reload: true
      when: service_modified.changed

    - name: Wait for k3s API
      wait_for:
        port: 6443
        delay: 10
        timeout: 120
      when: service_modified.changed
