---
# Hardware Watchdog - Automatic node recovery from freezes
# Enables BCM2835 watchdog on Raspberry Pi to auto-reboot if system becomes unresponsive
# Reference: https://github.com/raolivei/pi-fleet/issues/153

- name: Setup Hardware Watchdog
  hosts: raspberry_pi
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Install watchdog daemon
      apt:
        name: watchdog
        state: present
        update_cache: no

    # Raspberry Pi OS ships a systemd drop-in that enables RuntimeWatchdogSec=1m.
    # That claims /dev/watchdog before the watchdog daemon, so the daemon shows
    # "active" but alive=[none] and the node is not protected (see NODE-1-HANG doc).
    - name: Stat Raspberry Pi systemd watchdog drop-in
      stat:
        path: /usr/lib/systemd/system.conf.d/40-rpi-enable-watchdog.conf
      register: rpi_watchdog_dropin
    - name: Disable Raspberry Pi systemd hardware watchdog drop-in (when present)
      command: mv /usr/lib/systemd/system.conf.d/40-rpi-enable-watchdog.conf /usr/lib/systemd/system.conf.d/40-rpi-enable-watchdog.conf.disabled
      when: rpi_watchdog_dropin.stat.exists
      notify:
        - reload systemd
        - restart watchdog

    - name: Ensure systemd does not use the hardware watchdog device
      lineinfile:
        path: /etc/systemd/system.conf
        regexp: '^RuntimeWatchdogSec='
        line: 'RuntimeWatchdogSec=0'
        insertafter: '^\[Manager\]'
      notify:
        - reload systemd
        - restart watchdog

    - name: Install k3s health check script for watchdog test-binary
      template:
        src: ../templates/watchdog-k3s-health.sh.j2
        dest: /usr/local/bin/watchdog-k3s-health.sh
        owner: root
        group: root
        mode: '0755'

    - name: Create watchdog config
      template:
        src: ../templates/watchdog.conf.j2
        dest: /etc/watchdog.conf
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: restart watchdog

    - name: Enable persistent systemd journal storage
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage=persistent'
      notify: restart journald

    - name: Set journal disk usage limit
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?SystemMaxUse='
        line: 'SystemMaxUse=500M'
      notify: restart journald

    - name: Enable watchdog service
      systemd:
        name: watchdog
        enabled: yes
        state: started

    - name: Verify watchdog is active
      command: systemctl is-active watchdog
      register: watchdog_status
      changed_when: false
      failed_when: watchdog_status.rc not in [0]

    - name: Display watchdog status
      debug:
        msg: "Watchdog daemon is active on {{ inventory_hostname }}"

    - name: Verify watchdog daemon holds /dev/watchdog
      shell: lsof /dev/watchdog 2>/dev/null | awk 'NR>1 && $1=="watchdog" {found=1} END {exit !found}'
      register: watchdog_device_holder
      changed_when: false
      failed_when: watchdog_device_holder.rc != 0

    # Boot Loop Protection
    - name: Create boot guard script
      template:
        src: ../templates/watchdog-boot-guard.sh.j2
        dest: /usr/local/bin/watchdog-boot-guard.sh
        owner: root
        group: root
        mode: '0755'

    - name: Create boot guard systemd service
      template:
        src: ../templates/watchdog-boot-guard.service.j2
        dest: /etc/systemd/system/watchdog-boot-guard.service
        owner: root
        group: root
        mode: '0644'
      notify: reload systemd

    - name: Create boot guard reset service
      template:
        src: ../templates/watchdog-boot-guard-reset.service.j2
        dest: /etc/systemd/system/watchdog-boot-guard-reset.service
        owner: root
        group: root
        mode: '0644'
      notify: reload systemd

    - name: Create boot guard reset timer
      template:
        src: ../templates/watchdog-boot-guard-reset.timer.j2
        dest: /etc/systemd/system/watchdog-boot-guard-reset.timer
        owner: root
        group: root
        mode: '0644'
      notify: reload systemd

    - name: Enable boot guard service
      systemd:
        name: watchdog-boot-guard.service
        enabled: yes
        daemon_reload: yes

    - name: Enable boot guard reset timer
      systemd:
        name: watchdog-boot-guard-reset.timer
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Initialize boot counter if missing
      copy:
        content: "0\n"
        dest: /var/lib/watchdog-boot-count
        owner: root
        group: root
        mode: '0644'
        force: no

  handlers:
    - name: restart watchdog
      block:
        - name: Restart watchdog service
          systemd:
            name: watchdog
            state: restarted
      rescue:
        - name: Start watchdog after failed restart
          systemd:
            name: watchdog
            state: started
            enabled: yes

    - name: restart journald
      systemd:
        name: systemd-journald
        state: restarted

    - name: reload systemd
      systemd:
        daemon_reload: yes

- name: Reconcile node scheduling tiers (deprioritize node-1)
  import_playbook: configure-node-scheduling-tiers.yml
