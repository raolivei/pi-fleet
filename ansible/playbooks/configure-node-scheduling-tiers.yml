---
# Label stable/unstable nodes and deprioritize node-1 for new app pods (PreferNoSchedule taint).
# Does not evict existing workloads. Re-run after cluster rebuild or if labels/taints are lost.
#
# Usage (from pi-fleet/ansible):
#   ansible-playbook playbooks/configure-node-scheduling-tiers.yml

- name: Configure node scheduling tiers
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config-eldertree"
    kubectl_bin: kubectl
    k8s_node_suffix: ".eldertree.local"

  tasks:
    - name: Require kubeconfig
      stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_stat
      failed_when: not kubeconfig_stat.stat.exists

    - name: Label unstable node
      command: >
        {{ kubectl_bin }} label node
        {{ node_scheduling_unstable_host }}{{ k8s_node_suffix }}
        {{ node_scheduling_label_key }}=unstable
        --overwrite
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Label stable nodes
      command: >
        {{ kubectl_bin }} label node
        {{ item }}{{ k8s_node_suffix }}
        {{ node_scheduling_label_key }}=stable
        --overwrite
      loop: "{{ node_scheduling_stable_hosts }}"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Taint unstable node (PreferNoSchedule)
      command: >
        {{ kubectl_bin }} taint nodes
        {{ node_scheduling_unstable_host }}{{ k8s_node_suffix }}
        {{ node_scheduling_taint_key }}={{ node_scheduling_taint_value }}:{{ node_scheduling_taint_effect }}
        --overwrite
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Show node tiers and taints
      command: >
        {{ kubectl_bin }} get nodes
        -L {{ node_scheduling_label_key }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: nodes_out
      changed_when: false

    - name: Summary
      debug:
        msg: "{{ nodes_out.stdout_lines }}"
