[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
remote_user = raolivei
private_key_file = ~/.ssh/id_ed25519_raolivei
collections_paths = collections
roles_path = roles
template_extension = ['.j2', '.jinja', '.jinja2']
# Ensure group_vars are loaded from current directory
vars_plugins_enabled = host_group_vars,community.general.load_csv
# Uncomment if using password authentication:
# ask_pass = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no




