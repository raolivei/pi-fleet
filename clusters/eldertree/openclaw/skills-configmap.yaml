apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
  namespace: openclaw
  labels:
    app: openclaw
data:
  # SwimTO Skill - Query Toronto pool schedules
  swimto-skill.md: |
    # SwimTO Skill

    Query Toronto pool schedules and find swimming activities.

    ## Tools

    ### swimto_search
    Search for pools with specific activities.

    Parameters:
    - activity: string (optional) - Activity type: "lane_swim", "leisure_swim", "aquafit", "family_swim"
    - date: string (optional) - Date in YYYY-MM-DD format (default: today)

    Example: "Find pools with lane swim today"

    ### swimto_pool_schedule  
    Get the schedule for a specific pool.

    Parameters:
    - pool_name: string - Name of the pool (partial match supported)
    - days: number (optional) - Number of days to show (default: 7)

    Example: "Show me Regent Park pool schedule"

    ### swimto_nearby
    Find pools near a location.

    Parameters:
    - location: string - Address or neighborhood in Toronto
    - activity: string (optional) - Filter by activity type

    Example: "Find pools near High Park with family swim"

    ## Implementation

    The SwimTO API is available at: http://swimto-api.swimto.svc.cluster.local:8000

    Endpoints:
    - GET /api/pools - List all pools
    - GET /api/pools/{id}/schedule - Get pool schedule
    - GET /api/search?activity={type}&date={date} - Search by activity
    - GET /api/nearby?lat={lat}&lng={lng}&radius={km} - Find nearby pools

    ## Example Conversations

    User: "What pools have lane swim tonight?"
    Assistant: *calls swimto_search with activity="lane_swim" and today's date*

    User: "Show me Riverdale pool schedule for this week"
    Assistant: *calls swimto_pool_schedule with pool_name="Riverdale"*

  # Cluster Ops Skill - Kubernetes cluster operations
  cluster-ops-skill.md: |
    # Cluster Ops Skill

    Monitor and interact with the eldertree Kubernetes cluster.
    kubectl runs in the OpenClaw pod; permissions follow the `openclaw` Kubernetes RBAC (see pi-fleet `openclaw/rbac.yaml`).

    ## OpenClaw container (eldertree)

    - **Do not run `openclaw update` or `openclaw` CLI** in this pod — the binary is not a supported admin path. To upgrade OpenClaw, trigger the **GitHub Action** that builds `ghcr.io/raolivei/openclaw` and let **Flux** roll the new image (or use Elder `elder_upgrade` if configured).
    - **Gateway Web UI** uses **token** auth: paste the gateway token from Vault `secret/openclaw/gateway` (property `token` → k8s `OPENCLAW_GATEWAY_TOKEN`) when the Control UI asks; internal tools use the same value via env.

    ## How to Use

    You can run kubectl commands using the shell tool. Common commands:

    ### List pods in a namespace
    ```bash
    kubectl get pods -n swimto
    kubectl get pods -n canopy
    kubectl get pods -n openclaw
    kubectl get pods -A  # all namespaces
    ```

    ### Get pod logs
    ```bash
    kubectl logs -n swimto deployment/swimto-api --tail=50
    kubectl logs -n swimto deployment/swimto-web --tail=50
    kubectl logs -n canopy deployment/canopy-api --tail=50
    ```

    ### Check pod details (for troubleshooting)
    ```bash
    kubectl describe pod -n swimto -l app=swimto-api
    kubectl get events -n swimto --sort-by='.lastTimestamp'
    ```

    ### Cluster health
    ```bash
    kubectl get nodes
    kubectl top nodes  # resource usage
    kubectl top pods -n swimto  # pod resource usage
    ```

    ### Services and ingress
    ```bash
    kubectl get svc -n swimto
    kubectl get ingress -n swimto
    ```

    ## HashiCorp Vault

    Vault is deployed in the `vault` namespace.
    Internal API: `http://vault.vault.svc.cluster.local:8200`

    Check health (via exec):
    ```bash
    curl -s http://vault.vault.svc.cluster.local:8200/v1/sys/health | head -c 200
    ```

    Check seal status:
    ```bash
    curl -s http://vault.vault.svc.cluster.local:8200/v1/sys/seal-status
    ```

    For secret retrieval, use Elder's API — Elder handles the Vault token internally.
    Do NOT try to read Vault secrets directly with exec; Elder's skill endpoints
    (elder_*, gmail_*) already have the token and handle auth.

    ## Namespaces in Eldertree

    - **swimto**: SwimTO pool schedule app (Rafa's project)
    - **canopy**: Personal finance dashboard
    - **openclaw**: This is where you (Elder) live!
    - **vault**: HashiCorp Vault for secrets (`http://vault.vault.svc.cluster.local:8200`)
    - **monitoring**: Prometheus + Grafana
    - **longhorn-system**: Distributed storage
    - **flux-system**: GitOps controller

    ## Example Conversations

    User: "Show me swimto pod logs"
    Assistant: *runs `kubectl logs -n swimto deployment/swimto-api --tail=100`*

    User: "Are all pods healthy in swimto?"
    Assistant: *runs `kubectl get pods -n swimto` and analyzes output*

    User: "What's using the most memory?"
    Assistant: *runs `kubectl top pods -A --sort-by=memory`*

    ### Check for recent issues (last 24h)
    ```bash
    # Get recent events across all namespaces (warnings and errors)
    kubectl get events -A --sort-by='.lastTimestamp' | grep -E "Warning|Error" | tail -30

    # Get events for a specific namespace
    kubectl get events -n swimto --sort-by='.lastTimestamp'

    # Check for pod restarts (indicates issues)
    kubectl get pods -A | grep -E "CrashLoopBackOff|Error|Pending|ImagePullBackOff"

    # Check node status
    kubectl get nodes
    kubectl describe nodes | grep -A 5 "Conditions:"
    ```

    ## Important Notes

    - You have READ-ONLY access (no delete, scale, or modify operations)
    - Always use `--tail=N` when getting logs to avoid overwhelming output
    - Check events if pods are not starting: `kubectl get events -n NAMESPACE`
    - DO NOT try to access system logs (journalctl, /var/log) - use kubectl events instead
    - For "any issues" questions, check: events, pod status, node status

  # Eldertree Documentation Skill - Runbook, blog, and infrastructure knowledge
  eldertree-docs-skill.md: |
    # Eldertree Documentation Skill

    You have access to Eldertree's official documentation and blog. Use these for troubleshooting, architecture context, and infrastructure decisions.

    ## Documentation Sources

    ### 1. Runbook (eldertree-docs)
    - **URL**: https://docs.eldertree.xyz (public) or https://docs.eldertree.local (cluster network)
    - **Content**: Searchable incident runbook with error messages, symptoms, and resolution steps
    - **Use elder_search_code** and **elder_read_file** with repo `eldertree-docs` to find runbook content
    - **Key paths**: `runbook/` (overview), `runbook/issues/` (DNS, Cloudflare, Node, Boot, Network, Storage, SSH)
    - **Workflow**: See `runbook/workflow.md` for agent instructions on using the runbook

    ### 2. Blog (pi-fleet-blog)
    - **URL**: https://blog.eldertree.xyz (when deployed)
    - **Content**: Infrastructure journey, cluster setup, networking, monitoring, lessons learned
    - **Use elder_search_code** and **elder_read_file** with repo `pi-fleet-blog` to find blog content
    - **Key paths**: `chapters/` (01-vision through 18-reusable-workflows), `chapters/index.md` (all links)

    ### 3. Infrastructure Code (pi-fleet)
    - **Repo**: pi-fleet - cluster manifests, Ansible, Terraform, scripts
    - **Use elder_search_code** and **elder_read_file** with repo `pi-fleet` for docs/SERVICES_REFERENCE.md, docs/, scripts/

    ## When to Use

    - **Troubleshooting**: Search eldertree-docs runbook for error messages or symptoms first
    - **Architecture questions**: Search pi-fleet-blog chapters for design decisions and context
    - **Service URLs, IPs, credentials**: See pi-fleet/docs/SERVICES_REFERENCE.md
    - **Runbook workflow**: Follow eldertree-docs/runbook/workflow.md for incident resolution

    ## Example

    User: "Vault is sealed, how do I unseal it?"
    Assistant: *elder_search_code with repo="eldertree-docs" query="unseal vault" → elder_read_file runbook/issues/storage/VAULT-001.md*

  # Elder Skill - AI agent for code, infrastructure, and project management
  elder-skill.md: |
    # Elder Skill

    Elder is your AI agent that can browse codebases, manage GitHub issues/PRs,
    monitor Kubernetes, trigger deployments, and plan project features.
    Elder has its own GitHub App identity ("Elder [bot]").

    ## How to Call Skills

    Skills below describe HTTP calls you make using your `web_fetch` tool.
    The Elder API base URL is: **http://elder.openclaw.svc.cluster.local:8000**

    Example — `elder_create_pr`:
      `web_fetch POST http://elder.openclaw.svc.cluster.local:8000/api/code/pr`

    Elder handles GitHub App auth internally — you do NOT need a PAT, gh CLI,
    or any GitHub token. Never use exec or gh for Git/GitHub operations.

    **Auto-approved** operations run immediately. **Approval-required** operations
    return an approval ID — ask the user to confirm before executing.

    ## Tools

    ### elder_list_repos
    List all project repos Elder has cloned. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/code/repos

    ### elder_search_code
    Search code across all repos using ripgrep. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/code/search
    Body: {"query": "search term", "repo": "optional-repo-name", "file_pattern": "*.py", "max_results": 50}

    Example: "Search for authentication in SwimTO"

    ### elder_read_file
    Read contents of a file from a repo. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/code/read?repo=swimTO&path=backend/main.py

    ### elder_tree
    Get directory structure of a repo. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/code/tree?repo=swimTO&path=backend

    ### elder_edit_file
    Edit a file: creates a branch, commits, and pushes. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/code/edit
    Body: {"repo": "swimTO", "path": "backend/main.py", "content": "new content", "commit_message": "fix: description"}

    Returns an approval_id. Ask the user to approve before executing.

    ### elder_create_pr
    Create a pull request as Elder [bot]. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/code/pr
    Body: {"repo": "swimTO", "branch": "elder/fix-123", "title": "fix: description", "body": "PR body"}

    ### elder_list_issues
    List GitHub issues across one or all repos. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/github/issues/list
    Body: {"repo": "swimTO", "state": "open", "max_results": 20}

    ### elder_create_issue
    Create a GitHub issue as Elder [bot]. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/github/issues
    Body: {"repo": "swimTO", "title": "feat: new feature", "body": "Description", "labels": ["enhancement"]}

    ### elder_trigger_workflow
    Trigger a GitHub Actions workflow. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/github/trigger-workflow
    Body: {"repo": "swimTO", "workflow": "build-and-push.yml", "ref": "main"}

    ### elder_list_pods
    List Kubernetes pods. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/k8s/pods?namespace=swimto

    ### elder_pod_logs
    Get pod logs. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/k8s/logs
    Body: {"namespace": "swimto", "pod": "swimto-api-xxx", "tail_lines": 100}

    ### elder_events
    List cluster events. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/k8s/events?namespace=swimto

    ### elder_cluster_health
    Get cluster health summary with FluxCD status. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/k8s/health

    ### elder_scale
    Scale a deployment. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/k8s/scale
    Body: {"namespace": "swimto", "deployment": "swimto-api", "replicas": 2}

    ### elder_flux_reconcile
    Trigger FluxCD reconciliation. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/k8s/flux/reconcile
    Body: {"kustomization": "flux-system"}

    ### elder_project_status
    Get status of all managed projects (versions, health, last commits). (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/projects/status

    ### elder_roadmap
    Aggregate TODO/roadmap items from all projects. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/projects/roadmap

    ### elder_plan_feature
    Generate a feature plan and optionally create GitHub issues. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/projects/plan
    Body: {"project": "swimTO", "feature": "Push notifications", "description": "Add web push...", "create_issues": true}

    ### elder_run_tests
    Trigger test workflow. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/tests/run?repo=swimTO&workflow=python-ci.yml

    ### elder_test_status
    Get latest test run status. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/tests/status?repo=swimTO

    ### elder_pending_approvals
    List pending approval requests. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/approvals/pending

    ### elder_approve
    Approve a pending action after user confirms. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/approvals/{id}/approve

    ### elder_reject
    Reject a pending action. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/approvals/{id}/reject

    ### elder_best_answer
    Get the best possible answer by querying Gemini, Groq, and Ollama in parallel, then having
    a judge select/synthesize the best response. Use for important questions or double-checking. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/llm/best-answer
    Body: {"prompt": "user question", "system_prompt": "optional context", "providers": ["gemini", "groq", "ollama"], "timeout_seconds": 30}

    ### elder_llm_providers
    Check which LLM providers (Gemini, Groq, Ollama) are currently available. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/llm/providers

    ### elder_upgrade
    Trigger OpenClaw or Elder image rebuild via GitHub Actions. Requires approval. (approval required)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/meta/upgrade
    Body: {"component": "openclaw" or "elder", "version": "latest"}

    ### elder_version
    Get current versions of Elder and OpenClaw. (auto-approved)

    HTTP: GET http://elder.openclaw.svc.cluster.local:8000/api/meta/version

    ### elder_store_insight
    Store something you learned from this interaction. Call this when you learn useful info
    from a user question, your answer, or a resolved issue. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/memory/store
    Body: {"topic": "short-label", "content": "what was learned", "source": "interaction"}

    ### elder_recall_insights
    Recall stored insights before answering. Use to include relevant learned context. (auto-approved)

    HTTP: POST http://elder.openclaw.svc.cluster.local:8000/api/memory/recall
    Body: {"query": "optional search term", "topic": "optional exact topic", "limit": 20}

    ## Learning (Always Learn)

    You should ALWAYS learn from interactions:
    1. **Before answering**: Call elder_recall_insights with a query related to the user's question
    2. **After resolving**: Call elder_store_insight with topic and content summarizing what was learned
    3. **After explaining**: If your answer contains reusable knowledge (e.g. "Vault unseal uses X"), store it

    Topics: Use short labels like "vault-unseal", "swimto-deploy", "flux-reconcile", "node-troubleshoot"

    ## Approval Workflow

    When a user asks you to do something destructive (deploy, scale, edit code, trigger CI):
    1. Call the Elder endpoint — it returns an approval_id and description
    2. Show the user what will happen and ask for confirmation
    3. If they say yes, call elder_approve with the approval_id
    4. If they say no, call elder_reject

    ## Repo Names (use exactly for API calls)

    - canopy, swimTO, pi-fleet, pi-fleet-blog, eldertree-docs, elder, journey, nima, ollie, pitanga-website, northwaysignal-website, fragment

    ## Projects Managed by Elder

    | Project | Description | Cluster URL |
    |---------|-------------|-------------|
    | canopy | Personal finance | https://canopy.eldertree.local |
    | swimTO | Toronto pools | https://swimto.eldertree.xyz |
    | journey | AI career pathfinder | https://journey.eldertree.local |
    | nima | ML experiments | https://nima.eldertree.local |
    | ollie | Local AI assistant | - |
    | pi-fleet | Cluster infra | - |
    | pi-fleet-blog | Eldertree blog (chapters, journey) | https://blog.eldertree.xyz |
    | eldertree-docs | Runbook, troubleshooting | https://docs.eldertree.xyz |
    | pitanga-website | Company site | https://pitanga.cloud |
    | elder | This agent! | http://elder.openclaw.svc.cluster.local:8000 |

    ## Example Conversations

    User: "What's the status of all my projects?"
    Assistant: *calls elder_project_status, formats a summary table*

    User: "Search for the auth middleware in swimTO"
    Assistant: *calls elder_search_code with query="auth" and repo="swimTO"*

    User: "Deploy the latest SwimTO"
    Assistant: *calls elder_flux_reconcile → gets approval_id → shows plan → asks user to confirm → calls elder_approve*

    User: "Create an issue in swimTO for adding push notifications"
    Assistant: *calls elder_create_issue with title and body*

    User: "Let's work on the GitHub issues for canopy"
    Assistant: *calls elder_list_issues with repo="canopy" → presents list → asks which to tackle first*

    User: "What pods are failing?"
    Assistant: *calls elder_cluster_health, checks for failed pods and warnings*

  # Finance BR Skill - Brazilian financial indicators via public APIs (no key required)
  finance-br-skill.md: |
    # Finance BR Skill

    Fetch real-time Brazilian financial indicators using public APIs — no authentication required.

    ## Tools

    Use `web_fetch` to call these endpoints directly.

    ### bcb_selic
    Current Selic target rate (% per year).

    HTTP: GET https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados/ultimos/1?formato=json
    Returns: [{"data": "DD/MM/YYYY", "valor": "14.25"}]

    Example: "Qual a Selic hoje?"

    ### bcb_cdi
    Current CDI rate (% per year, effective daily rate).

    HTTP: GET https://api.bcb.gov.br/dados/serie/bcdata.sgs.4389/dados/ultimos/1?formato=json
    Returns: [{"data": "DD/MM/YYYY", "valor": "14.15"}]

    Example: "Qual o CDI atual?"

    ### bcb_ipca
    Latest IPCA monthly inflation (% for the month).

    HTTP: GET https://api.bcb.gov.br/dados/serie/bcdata.sgs.433/dados/ultimos/1?formato=json
    Returns: [{"data": "DD/MM/YYYY", "valor": "0.16"}]

    Example: "Qual foi o IPCA do último mês?"

    ### bcb_selic_efetiva
    Daily effective Selic rate (annualized, last business day).

    HTTP: GET https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json
    Returns: [{"data": "DD/MM/YYYY", "valor": "0.052531"}]

    ### bcb_ptax_usd
    Latest USD/BRL PTAX rate (last 5 business days, most recent first).

    HTTP: GET https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoDolarPeriodo(dataInicial=@dataInicial,dataFinalCotacao=@dataFinalCotacao)?@dataInicial='07-01-2026'&@dataFinalCotacao='07-20-2026'&$top=1&$orderby=dataHoraCotacao%20desc&$format=json&$select=cotacaoCompra,cotacaoVenda,dataHoraCotacao

    **Important**: Replace dates with actual current and 10-days-ago dates in MM-DD-YYYY format before calling.
    Returns: {"value": [{"cotacaoCompra": 5.117, "cotacaoVenda": 5.1176, "dataHoraCotacao": "2026-07-17 13:10:18"}]}

    Example: "Qual o dólar hoje?"

    ## BCB Series Reference

    | Indicador | Série | Frequência |
    |-----------|-------|-----------|
    | Selic meta | 432 | Por reunião COPOM |
    | CDI | 4389 | Diária |
    | IPCA | 433 | Mensal |
    | Selic efetiva | 11 | Diária |
    | IGP-M | 189 | Mensal |
    | Taxa de câmbio EUR | 21619 | Diária |

    URL pattern: `https://api.bcb.gov.br/dados/serie/bcdata.sgs.{SERIE}/dados/ultimos/{N}?formato=json`

    ## BRAPI — B3 Stocks, Crypto, Funds (requires token)

    Token is available in the `BRAPI_API_KEY` environment variable.
    Always append `?token=$BRAPI_API_KEY` to BRAPI requests.

    Base URL: `https://brapi.dev`

    ### brapi_quote
    Real-time B3 stock or BDR quote.

    HTTP: GET https://brapi.dev/api/quote/{ticker}?token=$BRAPI_API_KEY
    Example tickers: PETR4, VALE3, ITUB4, BBDC4, B3SA3
    Returns: {"results": [{"symbol": "PETR4", "regularMarketPrice": 38.50, "regularMarketChangePercent": 1.2, ...}]}

    Example: "Qual a cotação da PETR4?" → GET /api/quote/PETR4?token=...

    ### brapi_crypto
    Crypto price in BRL or USD.

    HTTP: GET https://brapi.dev/api/v2/crypto?coin={coin}&currency=BRL&token=$BRAPI_API_KEY
    Example coins: BTC, ETH, SOL, BNB
    Returns: {"coins": [{"coin": "BTC", "regularMarketPrice": 620000, "regularMarketChangePercent": 2.1, ...}]}

    Example: "Qual o Bitcoin em reais?" → GET /api/v2/crypto?coin=BTC&currency=BRL&token=...

    ### brapi_funds
    Brazilian investment fund (FII or fundo) data.

    HTTP: GET https://brapi.dev/api/v2/funds/{ticker}?token=$BRAPI_API_KEY

    ### brapi_available
    List all available tickers.

    HTTP: GET https://brapi.dev/api/available?token=$BRAPI_API_KEY

    ## Example Conversations

    User: "Qual a Selic atual?"
    Assistant: *web_fetch GET https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados/ultimos/1?formato=json → "A Selic meta está em 14,25% a.a. (decisão de 05/08/2026)"*

    User: "Qual o CDI e quanto rende em 1 ano?"
    Assistant: *web_fetch CDI (4389) → calcula rendimento bruto e líquido (IR 15%)*

    User: "Quanto está o dólar?"
    Assistant: *web_fetch PTAX com datas atuais → "USD/BRL: R$ 5,12 (compra) / R$ 5,12 (venda) — PTAX de 17/07/2026"*

    User: "Qual a cotação da VALE3?"
    Assistant: *web_fetch GET https://brapi.dev/api/quote/VALE3?token=$BRAPI_API_KEY → mostra preço, variação % do dia*

    User: "Quanto está o Bitcoin em reais?"
    Assistant: *web_fetch GET https://brapi.dev/api/v2/crypto?coin=BTC&currency=BRL&token=$BRAPI_API_KEY*

    User: "No que devo investir no Brasil no curto prazo?"
    Assistant: *web_fetch Selic (432) + CDI (4389) + IPCA (433) → analisa contexto: Selic 14.25%, IPCA recente, CDI como benchmark → recomendações: Tesouro Selic, CDBs 100%+ CDI, LCI/LCA isentos*

  # Ollie Skill - Workspace RAG and project knowledge
  ollie-skill.md: |
    # Ollie Skill

    Ollie is the workspace assistant with indexed knowledge of all raolivei projects (canopy, swimTO, pi-fleet, elder, personal-website, and more). Use it for architecture questions, deployment context, project status, and cross-repo knowledge.

    ## Tools

    Use `web_fetch` to call the Ollie API.

    Base URL: **http://core.ollie.svc.cluster.local:8000**

    ### workspace_ask
    Answer questions using workspace documentation (RAG with citations).

    HTTP: POST http://core.ollie.svc.cluster.local:8000/api/v1/workspace/ask
    Body: {"query": "your question here"}
    Returns: {"answer": "...", "sources": [...], "citations": [...]}

    Example: "Como faço deploy do canopy?" → POST workspace_ask

    ### workspace_search
    Semantic search across all indexed project docs.

    HTTP: POST http://core.ollie.svc.cluster.local:8000/api/v1/workspace/search
    Body: {"query": "search terms", "limit": 5}
    Returns: {"results": [{"content": "...", "source": "...", "score": 0.85}]}

    Example: "Encontra docs sobre autenticação no swimTO"

    ### workspace_chat
    Full conversational interface with RAG + Elder routing.

    HTTP: POST http://core.ollie.svc.cluster.local:8000/api/chat
    Body: {"message": "your message", "session_id": "telegram-{user_id}"}
    Returns: {"response": "...", "sources": [...]}

    ### workspace_projects
    List all indexed projects with document counts and health.

    HTTP: GET http://core.ollie.svc.cluster.local:8000/api/v1/workspace/projects
    Returns: {"projects": [{"name": "swimTO", "chunks": 142, "last_indexed": "..."}]}

    ## When to Use Ollie

    - Architecture or design questions about any raolivei project
    - "How does X work in Y project?" questions
    - Finding relevant documentation, conventions, or patterns
    - Cross-project knowledge (e.g., "how is auth done across projects?")
    - Any question where Elder code search returns nothing — Ollie has doc-level context

    **Prefer Elder tools** for live code (search_code, read_file) and K8s ops.
    **Use Ollie** for documentation, conventions, and architectural context.

    ## Example Conversations

    User: "Como está configurado o FluxCD no pi-fleet?"
    Assistant: *POST workspace_ask with query → Ollie returns indexed doc content with sources*

    User: "Qual a arquitetura do canopy?"
    Assistant: *POST workspace_ask → returns architecture overview from canopy docs*

    User: "Quais projetos estão indexados?"
    Assistant: *GET workspace_projects → lists all indexed repos with chunk counts*

  # Web Browsing Skill - Fetch URLs and search the web
  web-browsing-skill.md: |
    # Web Browsing Skill

    Use built-in tools to fetch web pages, read URLs, and search the internet.

    ## Tools

    ### web_fetch (built-in)
    Fetch any URL — GET or POST. Use for reading articles, API responses, documentation pages.

    Examples:
    - Read a news article: web_fetch GET https://example.com/article
    - Call a public API: web_fetch GET https://api.example.com/data
    - POST to an API: web_fetch POST https://api.example.com/query with JSON body

    ### Brave Search (built-in, key auto-loaded from BRAVE_API_KEY env)
    Search the web when you need current events, news, prices, or information not available from cluster services.

    **Use Brave Search when:**
    - The user asks about current events or recent news
    - You need real-world context not in cluster docs
    - A URL fetch returns a 404 or unhelpful content
    - The user asks to "search" or "look up" something on the internet

    **Do NOT use for:**
    - Cluster ops → use kubectl or elder_*
    - Project docs → use workspace_ask (Ollie) or elder_search_code
    - Brazilian financial indicators → use finance-br-skill (BCB API, no key needed)

    ## Example Conversations

    User: "Por que o preço do petróleo subiu em Toronto esses dias?"
    Assistant: *Brave Search "oil price spike Toronto July 2026" → summarizes top results*

    User: "Lê esse artigo pra mim: https://..."
    Assistant: *web_fetch GET <url> → summarizes content*

    User: "Qual a cotação do Bitcoin agora?"
    Assistant: *Brave Search "Bitcoin BRL price" → returns current price*

  # Gmail Skill - Read and send emails
  gmail-skill.md: |
    # Gmail Skill

    Read, search, and manage Gmail inbox for rafa.oliveira1@gmail.com.

    ## Tools

    ### gmail_list
    Search and list emails from inbox.

    Parameters:
    - query: string - Gmail search query (e.g., "is:unread", "from:someone@example.com", "subject:invoice")
    - max_results: number (optional) - Max messages to return (default: 20)

    Example: "Show my unread emails"

    ### gmail_get
    Get full email content including body and headers.

    Parameters:
    - message_id: string - Gmail message ID

    Example: "Show me the full content of message ID xyz123"

    ### gmail_send
    Send an email (requires approval).

    Parameters:
    - to: string - Recipient email address
    - subject: string - Email subject
    - body: string - Email body content
    - html: boolean (optional) - Is body HTML formatted? (default: false)
    - cc: string (optional) - CC recipients (comma-separated)
    - bcc: string (optional) - BCC recipients (comma-separated)

    Example: "Send email to test@example.com with subject 'Test' and body 'Hello'"

    ### gmail_modify
    Archive, mark read/unread, or apply labels to emails.

    Parameters:
    - message_id: string - Gmail message ID
    - add_labels: array (optional) - Label IDs to add (e.g., ["IMPORTANT"])
    - remove_labels: array (optional) - Label IDs to remove (e.g., ["UNREAD"])

    Example: "Archive this email"

    ### gmail_thread
    Get full conversation thread.

    Parameters:
    - thread_id: string - Gmail thread ID

    Example: "Show me the full thread of conversation xyz"

    ## Implementation

    Elder API endpoints (require X-API-Key header):
    - POST /api/gmail/list - List/search messages
    - POST /api/gmail/get - Get single message
    - POST /api/gmail/send - Send email (approval required)
    - POST /api/gmail/modify - Modify labels
    - POST /api/gmail/thread - Get conversation thread

    Elder service URL: http://elder.openclaw.svc.cluster.local:8000

    Authentication: Elder handles OAuth refresh token from Vault (secret/openclaw/gmail).

    ## Common Label IDs

    - UNREAD - Unread messages
    - STARRED - Starred messages
    - IMPORTANT - Important messages
    - SENT - Sent messages
    - DRAFT - Draft messages
    - ARCHIVE - Archived messages

    ## Example Conversations

    User: "Show me my unread emails"
    Assistant: *calls gmail_list with query="is:unread"*

    User: "Find emails from alice@example.com"
    Assistant: *calls gmail_list with query="from:alice@example.com"*

    User: "Send an email to bob@example.com"
    Assistant: *calls gmail_send with to="bob@example.com" → approval required → shows plan → asks for confirmation*

    User: "Archive all spam"
    Assistant: *calls gmail_list with query="label:SPAM" → for each message calls gmail_modify with add_labels=["ARCHIVE"]*
