apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elder-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: elder-secrets
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: secret/elder/github-app
        property: app-id
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: secret/elder/github-app
        property: installation-id
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key: secret/elder/github-app
        property: private-key
    - secretKey: API_KEY
      remoteRef:
        key: secret/elder/api-key
        property: key
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: secret/openclaw/gemini
        property: api-key
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: secret/openclaw/groq
        property: api-key
