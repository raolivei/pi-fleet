apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  # Environment variables for OpenClaw
  OPENCLAW_GATEWAY_BIND: "0.0.0.0"
  OPENCLAW_GATEWAY_PORT: "18789"
  OPENCLAW_DISABLE_BONJOUR: "1"
  TZ: "America/Toronto"
  SWIMTO_API_URL: "http://swimto-api.swimto.svc.cluster.local:8000"
  ELDER_URL: "http://elder.openclaw.svc.cluster.local:8000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config-file
  namespace: openclaw
  labels:
    app: openclaw
data:
  config.json: |
    {
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "open",
          "allowFrom": ["*"]
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16"],
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "http": {
          "endpoints": {
            "chatCompletions": { "enabled": true }
          }
        },
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.eldertree.local",
            "http://openclaw.eldertree.local"
          ],
          "requireDevicePairing": false
        }
      },
      "tools": {
        "exec": {
          "host": "gateway",
          "security": "full",
          "ask": "off"
        },
        "elevated": {
          "enabled": true,
          "allowFrom": {
            "telegram": ["*"]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "groq/openai/gpt-oss-120b",
            "fallbacks": [
              "groq/llama-3.3-70b-versatile",
              "groq/meta-llama/llama-4-scout-17b-16e-instruct",
              "openrouter/google/gemini-2.0-flash-001"
            ]
          },
          "contextTokens": 80000,
          "compaction": {
            "mode": "safeguard",
            "reserveTokensFloor": 20000,
            "model": "groq/openai/gpt-oss-120b",
            "memoryFlush": {
              "enabled": false
            }
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "openrouter": {
            "api": "openai-completions",
            "baseUrl": "https://openrouter.ai/api/v1",
            "apiKey": "${OPENROUTER_API_KEY}",
            "models": [
              {
                "id": "meta-llama/llama-4-scout",
                "name": "Llama 4 Scout (OpenRouter)",
                "contextWindow": 131072,
                "maxTokens": 3072
              },
              {
                "id": "google/gemini-2.0-flash-001",
                "name": "Gemini 2.0 Flash (OpenRouter)",
                "contextWindow": 24000,
                "maxTokens": 3072
              },
              {
                "id": "anthropic/claude-3.5-haiku",
                "name": "Claude 3.5 Haiku (OpenRouter)",
                "contextWindow": 200000,
                "maxTokens": 3072
              }
            ]
          },
          "groq": {
            "api": "openai-completions",
            "baseUrl": "https://api.groq.com/openai/v1",
            "apiKey": "${GROQ_API_KEY}",
            "models": [
              {
                "id": "openai/gpt-oss-120b",
                "name": "GPT OSS 120B (Groq)",
                "contextWindow": 131072,
                "maxTokens": 8192
              },
              {
                "id": "llama-3.3-70b-versatile",
                "name": "Llama 3.3 70B Versatile (Groq)",
                "contextWindow": 131072,
                "maxTokens": 3072
              },
              {
                "id": "meta-llama/llama-4-scout-17b-16e-instruct",
                "name": "Llama 4 Scout 17B (Groq)",
                "contextWindow": 131072,
                "maxTokens": 3072
              }
            ]
          }
        }
      }
    }
