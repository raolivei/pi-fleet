apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  # Environment variables for OpenClaw
  OPENCLAW_GATEWAY_BIND: "0.0.0.0"
  OPENCLAW_GATEWAY_PORT: "18789"
  TZ: "America/Toronto"
  SWIMTO_API_URL: "http://swimto-api.swimto.svc.cluster.local:8000"
  ELDER_URL: "http://elder.openclaw.svc.cluster.local:8000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config-file
  namespace: openclaw
  labels:
    app: openclaw
data:
  config.json: |
    {
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "open",
          "allowFrom": ["*"]
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "x-forwarded-user",
            "allowUsers": ["local"]
          }
        },
        "http": {
          "endpoints": {
            "chatCompletions": { "enabled": true }
          }
        },
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.eldertree.local",
            "http://openclaw.eldertree.local"
          ]
        }
      },
      "agents": {
        "defaults": {
          "instructions": "You are Elder, a helpful personal AI assistant. Reply directly and concisely. Do NOT show your reasoning steps, chain-of-thought, or intermediate analysis. Just give the answer.",
          "model": {
            "primary": "groq/meta-llama/llama-4-scout-17b-16e-instruct",
            "fallbacks": [
              "groq/llama-3.3-70b-versatile",
              "google/gemini-2.0-flash"
            ]
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "google": {
            "api": "google-generative-ai",
            "baseUrl": "https://generativelanguage.googleapis.com/v1beta",
            "apiKey": "${GOOGLE_API_KEY}",
            "models": [
              {
                "id": "gemini-2.0-flash",
                "name": "Gemini 2.0 Flash",
                "contextWindow": 1048576,
                "maxTokens": 8192
              }
            ]
          },
          "groq": {
            "api": "openai-completions",
            "baseUrl": "https://api.groq.com/openai/v1",
            "apiKey": "${GROQ_API_KEY}",
            "models": [
              {
                "id": "meta-llama/llama-4-scout-17b-16e-instruct",
                "name": "Llama 4 Scout 17B",
                "contextWindow": 131072,
                "maxTokens": 16384
              },
              {
                "id": "llama-3.3-70b-versatile",
                "name": "Llama 3.3 70B Versatile",
                "contextWindow": 131072,
                "maxTokens": 8192
              },
              {
                "id": "llama-3.1-8b-instant",
                "name": "Llama 3.1 8B Instant",
                "contextWindow": 131072,
                "maxTokens": 8192
              }
            ]
          }
        }
      }
    }
