apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  # Environment variables for OpenClaw
  OPENCLAW_GATEWAY_BIND: "0.0.0.0"
  OPENCLAW_GATEWAY_PORT: "18789"
  TZ: "America/Toronto"
  SWIMTO_API_URL: "http://swimto-api.swimto.svc.cluster.local:8000"
  GROVE_URL: "http://grove.openclaw.svc.cluster.local:8000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config-file
  namespace: openclaw
  labels:
    app: openclaw
data:
  config.json: |
    {
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "open",
          "allowFrom": ["*"]
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "x-forwarded-user",
            "allowUsers": ["local"]
          }
        },
        "http": {
          "endpoints": {
            "chatCompletions": { "enabled": true }
          }
        },
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.eldertree.local",
            "http://openclaw.eldertree.local"
          ]
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "google/gemini-1.5-flash",
            "fallbacks": [
              "groq/llama-3.1-70b-versatile",
              "ollama/qwen2.5:14b"
            ]
          }
        }
      }
    }
