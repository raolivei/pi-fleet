apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
  namespace: openclaw
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/eldertree-app
      version: "0.1.1"
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 12h
  targetNamespace: openclaw
  upgrade:
    cleanupOnFail: false
    timeout: 10m
  values:
    # ============================================================
    # OpenClaw - LLM gateway + Elder AI agent
    # ============================================================

    components:
      openclaw:
        image:
          repository: ghcr.io/raolivei/openclaw
          tag: latest
          pullPolicy: Always
        port: 18789
        strategy: Recreate
        serviceAccountName: openclaw
        podAnnotations:
          deployment.kubernetes.io/revision: "2026-01-31-v1.0.0"
        command:
          - /bin/sh
          - -c
          - |
            set -e
            export OPENCLAW_DIR=/home/node/.openclaw
            export CONFIG_FILE=$OPENCLAW_DIR/openclaw.json
            mkdir -p $OPENCLAW_DIR/agents/main/sessions $OPENCLAW_DIR/credentials $OPENCLAW_DIR/workspace
            if [ ! -s "$CONFIG_FILE" ]; then echo "[openclaw] Config missing"; exit 1; fi
            export OLLAMA_API_KEY="${OLLAMA_API_KEY:-ollama-local}"
            export GROQ_API_KEY="${GROQ_API_KEY:-}"
            export OLLAMA_BASE_URL="${OLLAMA_BASE_URL:-http://127.0.0.1:11434}"
            echo "[openclaw] Skipping doctor (config from ConfigMap)"
            exec node /app/dist/index.js gateway --bind lan
        env:
          - name: GOOGLE_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GOOGLE_API_KEY
          - name: TELEGRAM_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: TELEGRAM_BOT_TOKEN
          - name: OPENCLAW_GATEWAY_TOKEN
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: OPENCLAW_GATEWAY_TOKEN
          - name: BRAVE_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: BRAVE_API_KEY
          - name: GROQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GROQ_API_KEY
                optional: true
          - name: OLLAMA_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: OLLAMA_API_KEY
                optional: true
          - name: OLLAMA_BASE_URL
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: OLLAMA_BASE_URL
                optional: true
          - name: HOME
            value: /home/node
          - name: NODE_OPTIONS
            value: "--max-old-space-size=1536 --unhandled-rejections=warn"
        envFrom:
          - configMapRef:
              name: openclaw-config
        resources:
          requests: { cpu: "200m", memory: "1Gi" }
          limits: { cpu: "1000m", memory: "2Gi" }
        probes:
          path: /health
          port: 18789
          liveness: { initialDelaySeconds: 180, periodSeconds: 30, timeoutSeconds: 10 }
          readiness: { initialDelaySeconds: 150, periodSeconds: 10, timeoutSeconds: 5 }
        volumeMounts:
          - name: openclaw-data
            mountPath: /home/node/.openclaw
          - name: config-file
            mountPath: /home/node/.openclaw/openclaw.json
            subPath: config.json
          - name: skills
            mountPath: /home/node/.openclaw/skills
            readOnly: true
        volumes:
          - name: openclaw-data
            persistentVolumeClaim:
              claimName: openclaw-data
          - name: config-file
            configMap:
              name: openclaw-config-file
          - name: skills
            configMap:
              name: openclaw-skills

      elder:
        image:
          repository: ghcr.io/raolivei/grove
          tag: v0.2.0 # {"$imagepolicy": "openclaw:elder:tag"}
          pullPolicy: Always
        port: 8006
        servicePort: 8000
        strategy: Recreate
        serviceAccountName: elder
        envFrom:
          - configMapRef:
              name: elder-config
        env:
          - name: GROVE_PORT
            value: "8006"
          - name: GROVE_K8S_IN_CLUSTER
            value: "true"
          - name: GROVE_REPOS_DIR
            value: "/data/repos"
          - name: GROVE_APPROVAL_DB_PATH
            value: "/data/approvals.db"
          - name: GROVE_API_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: API_KEY
          - name: GROVE_GITHUB_APP_ID
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GITHUB_APP_ID
          - name: GROVE_GITHUB_APP_INSTALLATION_ID
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GITHUB_APP_INSTALLATION_ID
          - name: GROVE_GITHUB_APP_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GITHUB_APP_PRIVATE_KEY
          - name: GROVE_GEMINI_API_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GEMINI_API_KEY
                optional: true
          - name: GROVE_GROQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GROQ_API_KEY
                optional: true
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        probes:
          path: /health
          port: 8006
          liveness: { initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 10 }
          readiness: { initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 5 }
        volumeMounts:
          - name: elder-data
            mountPath: /data
        volumes:
          - name: elder-data
            persistentVolumeClaim:
              claimName: elder-data

    # -- Middleware
    middleware:
      redirect-https:
        type: redirectScheme
        scheme: https
        permanent: true
      add-trusted-proxy-user:
        type: headers
        headers:
          customRequestHeaders:
            X-Forwarded-User: "local"

    # -- Ingress
    ingress:
      openclaw-web:
        host: openclaw.eldertree.local
        service: openclaw
        port: 18789
        middlewares:
          - openclaw-redirect-https@kubernetescrd
          - openclaw-add-trusted-proxy-user@kubernetescrd
        tls:
          secretName: openclaw-tls
          certManager: true
        annotations:
          external-dns.alpha.kubernetes.io/hostname: openclaw.eldertree.local

      elder:
        host: elder.eldertree.local
        service: elder
        port: 8000
        tls:
          secretName: elder-tls
          certManager: true
        annotations:
          external-dns.alpha.kubernetes.io/hostname: elder.eldertree.local
