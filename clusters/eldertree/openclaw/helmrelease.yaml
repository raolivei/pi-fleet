apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
  namespace: openclaw
spec:
  interval: 30m
  chart:
    spec:
      chart: ./helm/eldertree-app
      version: "0.1.1"
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 12h
  targetNamespace: openclaw
  upgrade:
    cleanupOnFail: false
    timeout: 10m
  values:
    # ============================================================
    # OpenClaw - LLM gateway + Elder AI agent
    # ============================================================

    components:
      openclaw:
        image:
          repository: ghcr.io/raolivei/openclaw
          tag: latest
          pullPolicy: Always
        port: 18789
        strategy: Recreate
        serviceAccountName: openclaw
        command:
          - /bin/sh
          - -c
          - |
            set -e
            export OPENCLAW_DIR=/home/node/.openclaw
            export CONFIG_FILE=$OPENCLAW_DIR/openclaw.json
            mkdir -p $OPENCLAW_DIR/agents/main/sessions $OPENCLAW_DIR/credentials $OPENCLAW_DIR/workspace
            # Seed writable openclaw.json from ConfigMap only when CM changes or file missing.
            # Always cp caused OpenClaw "missing-meta-*" noise every restart (it embeds file metadata on PVC).
            CM_SRC=/etc/openclaw-config/config.json
            HASHFILE="$OPENCLAW_DIR/.openclaw-config.cm.sha256"
            if [ ! -r "$CM_SRC" ]; then
              echo "[openclaw] ConfigMap mount missing: $CM_SRC"; exit 1
            fi
            newhash=$(sha256sum "$CM_SRC" | awk '{print $1}')
            if [ ! -s "$CONFIG_FILE" ] || [ ! -f "$HASHFILE" ]; then
              cp -f "$CM_SRC" "$CONFIG_FILE"
              echo "$newhash" > "$HASHFILE"
              echo "[openclaw] Seeded openclaw.json from ConfigMap (initial or empty PVC)"
            elif [ "$(cat "$HASHFILE")" != "$newhash" ]; then
              cp -f "$CM_SRC" "$CONFIG_FILE"
              echo "$newhash" > "$HASHFILE"
              echo "[openclaw] Refreshed openclaw.json from ConfigMap (ConfigMap content changed)"
            else
              echo "[openclaw] Keeping PVC openclaw.json (ConfigMap hash unchanged; preserves OpenClaw file metadata)"
            fi
            # Copy exec policy onto PVC (OpenClaw mutates this file; ConfigMap mount would be EROFS)
            if [ -r /etc/openclaw-defaults/exec-approvals.json ]; then
              cp -f /etc/openclaw-defaults/exec-approvals.json "$OPENCLAW_DIR/exec-approvals.json"
              echo "[openclaw] Seeded exec-approvals.json (writable on PVC)"
            fi
            echo "[openclaw] Skipping doctor (config from ConfigMap)"
            exec node /app/dist/index.js gateway --bind lan
        env:
          - name: TELEGRAM_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: TELEGRAM_BOT_TOKEN
          - name: OPENCLAW_GATEWAY_TOKEN
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: OPENCLAW_GATEWAY_TOKEN
          - name: BRAVE_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: BRAVE_API_KEY
          - name: GROQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GROQ_API_KEY
                optional: true
          - name: OPENROUTER_API_KEY
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: OPENROUTER_API_KEY
          - name: HOME
            value: /home/node
          - name: NODE_OPTIONS
            value: "--max-old-space-size=2048 --unhandled-rejections=warn"
        envFrom:
          - configMapRef:
              name: openclaw-config
        resources:
          requests: { cpu: "200m", memory: "1536Mi" }
          limits: { cpu: "1000m", memory: "3Gi" }
        probes:
          path: /health
          port: 18789
          liveness: { initialDelaySeconds: 180, periodSeconds: 30, timeoutSeconds: 10 }
          readiness: { initialDelaySeconds: 150, periodSeconds: 10, timeoutSeconds: 5 }
        volumeMounts:
          - name: openclaw-data
            mountPath: /home/node/.openclaw
          - name: config-file
            mountPath: /etc/openclaw-config
            readOnly: true
          - name: exec-approvals-defaults
            mountPath: /etc/openclaw-defaults
            readOnly: true
          - name: skills
            mountPath: /home/node/.openclaw/workspace/skills
            readOnly: true
        volumes:
          - name: openclaw-data
            persistentVolumeClaim:
              claimName: openclaw-data
          - name: config-file
            configMap:
              name: openclaw-config-file
          - name: exec-approvals-defaults
            configMap:
              name: openclaw-exec-approvals
          - name: skills
            configMap:
              name: openclaw-skills

      elder:
        image:
          repository: ghcr.io/raolivei/grove
          tag: v0.2.0 # {"$imagepolicy": "openclaw:elder:tag"}
          pullPolicy: Always
        port: 8006
        servicePort: 8000
        strategy: Recreate
        serviceAccountName: elder
        envFrom:
          - configMapRef:
              name: elder-config
        env:
          - name: ELDER_PORT
            value: "8006"
          - name: ELDER_K8S_IN_CLUSTER
            value: "true"
          - name: ELDER_REPOS_DIR
            value: "/data/repos"
          - name: ELDER_APPROVAL_DB_PATH
            value: "/data/approvals.db"
          - name: ELDER_API_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: API_KEY
          - name: ELDER_GITHUB_APP_ID
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GITHUB_APP_ID
          - name: ELDER_GITHUB_APP_INSTALLATION_ID
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GITHUB_APP_INSTALLATION_ID
          - name: ELDER_GITHUB_APP_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GITHUB_APP_PRIVATE_KEY
          - name: ELDER_GEMINI_API_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GEMINI_API_KEY
                optional: true
          - name: ELDER_GROQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: elder-secrets
                key: GROQ_API_KEY
                optional: true
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        probes:
          path: /health
          port: 8006
          liveness: { initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 10 }
          readiness: { initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 5 }
        volumeMounts:
          - name: elder-data
            mountPath: /data
        volumes:
          - name: elder-data
            persistentVolumeClaim:
              claimName: elder-data

    # -- Middleware
    middleware:
      redirect-https:
        type: redirectScheme
        scheme: https
        permanent: true
    # -- Ingress
    ingress:
      openclaw-web:
        host: openclaw.eldertree.local
        service: openclaw
        port: 18789
        middlewares:
          - openclaw-redirect-https@kubernetescrd
        tls:
          secretName: openclaw-tls
          certManager: true
        annotations:
          external-dns.alpha.kubernetes.io/hostname: openclaw.eldertree.local

      elder:
        host: elder.eldertree.local
        service: elder
        port: 8000
        tls:
          secretName: elder-tls
          certManager: true
        annotations:
          external-dns.alpha.kubernetes.io/hostname: elder.eldertree.local
