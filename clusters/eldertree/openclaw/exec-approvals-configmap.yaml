# Seeded into ~/.openclaw/exec-approvals.json on each pod start (writable PVC).
# Do not mount this file directly — OpenClaw updates exec-approvals.json at runtime (EROFS if read-only).
# Policy: gateway exec security full (cluster boundary = RBAC in rbac.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-exec-approvals
  namespace: openclaw
  labels:
    app: openclaw
data:
  exec-approvals.json: |
    {
      "version": 1,
      "defaults": {
        "security": "full",
        "ask": "off",
        "askFallback": "full",
        "autoAllowSkills": true
      },
      "agents": {
        "main": {
          "security": "full",
          "ask": "off",
          "askFallback": "full",
          "autoAllowSkills": true
        }
      }
    }
