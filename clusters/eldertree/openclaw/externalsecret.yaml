apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openclaw-secrets
    creationPolicy: Owner
  data:
    # Telegram Bot Token
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: secret/openclaw/telegram
        property: token
    # Gateway Authentication Token
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      remoteRef:
        key: secret/openclaw/gateway
        property: token
    # Brave Search API Key (web search)
    - secretKey: BRAVE_API_KEY
      remoteRef:
        key: secret/openclaw/brave
        property: BRAVE_API_KEY
    # Groq API Key (multi-provider fallback)
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: secret/openclaw/groq
        property: api-key
    # OpenRouter API Key (multi-provider routing)
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: secret/openclaw/openrouter
        property: api-key
    # Elder API Key (authenticates OpenClaw → Elder HTTP calls)
    - secretKey: ELDER_API_KEY
      remoteRef:
        key: secret/elder/api-key
        property: key
    # BRAPI API Key (Brazilian financial data — B3 stocks, crypto, funds)
    - secretKey: BRAPI_API_KEY
      remoteRef:
        key: secret/openclaw/brapi
        property: api-key
    # Gmail OAuth Credentials
    - secretKey: ELDER_GMAIL_CLIENT_ID
      remoteRef:
        key: secret/openclaw/gmail
        property: client-id
    - secretKey: ELDER_GMAIL_CLIENT_SECRET
      remoteRef:
        key: secret/openclaw/gmail
        property: client-secret
    - secretKey: ELDER_GMAIL_REFRESH_TOKEN
      remoteRef:
        key: secret/openclaw/gmail
        property: refresh-token
    - secretKey: ELDER_GMAIL_USER_EMAIL
      remoteRef:
        key: secret/openclaw/gmail
        property: user-email
