apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # OpenClaw
  - namespace.yaml
  - rbac.yaml
  - externalsecret.yaml
  - ghcr-secret-external.yaml
  - pvc.yaml
  - configmap.yaml
  - skills-configmap.yaml
  # Elder (AI agent sidecar; image from grove repo until elder image exists)
  - elder-rbac.yaml
  - elder-externalsecret.yaml
  - elder-pvc.yaml
  - elder-configmap.yaml
  # Helm-managed app (openclaw gateway + elder deployment, services, ingress)
  - helmrelease.yaml
  - elder-image-repo.yaml
  - elder-image-policy.yaml
  - elder-image-update.yaml
