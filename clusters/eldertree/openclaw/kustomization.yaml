apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # OpenClaw
  - namespace.yaml
  - rbac.yaml
  - externalsecret.yaml
  - ghcr-secret-external.yaml
  - pvc.yaml
  - configmap.yaml
  - exec-approvals-configmap.yaml
  - workspace-configmap.yaml
  - ollama-fallback.yaml
  # Elder (AI agent sidecar)
  - elder-rbac.yaml
  - elder-externalsecret.yaml
  - elder-pvc.yaml
  - elder-configmap.yaml
  # Helm-managed app (openclaw gateway + elder deployment, services, ingress)
  - helmrelease.yaml
  - elder-image-repo.yaml
  - elder-image-policy.yaml
  - openclaw-image-repo.yaml
  - openclaw-image-policy.yaml
  - elder-image-update.yaml
  - control-cloudflare-origin-cert-external.yaml

configMapGenerator:
  - name: openclaw-skills
    namespace: openclaw
    options:
      disableNameSuffixHash: true
    files:
      - skills/swimto-skill.md
      - skills/cluster-ops-skill.md
      - skills/eldertree-docs-skill.md
      - skills/elder-skill.md
      - skills/gmail-skill.md
      - skills/finance-br-skill.md
      - skills/ollie-skill.md
      - skills/web-browsing-skill.md
