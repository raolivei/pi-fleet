# ServiceAccount for Elder
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elder
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elder-agent
rules:
  # Read-only cluster resources (no secrets)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "patch"]
---
# Namespace-scoped role for secrets (openclaw namespace only)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: elder-secrets-reader
  namespace: openclaw
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elder-agent-binding
subjects:
  - kind: ServiceAccount
    name: elder
    namespace: openclaw
roleRef:
  kind: ClusterRole
  name: elder-agent
  apiGroup: rbac.authorization.k8s.io
---
# Bind secrets access only to openclaw namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elder-secrets-reader-binding
  namespace: openclaw
subjects:
  - kind: ServiceAccount
    name: elder
    namespace: openclaw
roleRef:
  kind: Role
  name: elder-secrets-reader
  apiGroup: rbac.authorization.k8s.io
