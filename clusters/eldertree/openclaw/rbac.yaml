# ServiceAccount for OpenClaw (kubectl exec in the openclaw pod uses in-cluster credentials).
# Security model: cluster-wide workload & config management; storage and cluster control-plane
# surfaces are read-only (no create/update/patch/delete on PV/PVC/snapshots/StorageClass, etc.).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-reader
  labels:
    app.kubernetes.io/component: openclaw-rbac
rules:
  # ---------------------------------------------------------------------------
  # Storage & volume data plane — READ ONLY (no mutate/delete)
  # ---------------------------------------------------------------------------
  - apiGroups: [""]
    resources:
      - persistentvolumes
      - persistentvolumeclaims
      - persistentvolumeclaims/status
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
      - csidrivers
      - csinodes
      - csistoragecapacities
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotcontents
      - volumesnapshotclasses
    verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Cluster control-plane / security — READ ONLY
  # ---------------------------------------------------------------------------
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
      - validatingadmissionpolicies
      - validatingadmissionpolicybindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Namespaces — manage metadata/labels; NO delete (prevents wiping namespaces)
  # ---------------------------------------------------------------------------
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # ---------------------------------------------------------------------------
  # Nodes — inspect & maintain (cordon/taints); NO delete
  # ---------------------------------------------------------------------------
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # ---------------------------------------------------------------------------
  # Core workload & networking — full lifecycle (all namespaces)
  # ---------------------------------------------------------------------------
  - apiGroups: [""]
    resources:
      - pods
      - pods/status
      - pods/ephemeralcontainers
      - replicationcontrollers
      - services
      - serviceaccounts
      - configmaps
      - secrets
      - limitranges
      - resourcequotas
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - pods/log
      - pods/exec
      - pods/portforward
      - pods/proxy
      - services/proxy
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
      - replicasets
      - replicasets/scale
      - statefulsets
      - statefulsets/scale
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Namespace-scoped RBAC (not cluster roles)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Metrics (kubectl top)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Flux CD — reconcile GitOps objects (still subject to no-storage rules above)
  # ---------------------------------------------------------------------------
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - buckets
      - gitrepositories
      - helmcharts
      - helmrepositories
      - ocirepositories
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources:
      - providers
      - alerts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources:
      - imagerepositories
      - imagepolicies
      - imageupdateautomations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ---------------------------------------------------------------------------
  # cert-manager (common on this cluster) — certs without touching storage classes
  # ---------------------------------------------------------------------------
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - issuers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Longhorn UI/API — read-only (volumes tie to PV/PVC; avoid destructive CRD ops)
  # ---------------------------------------------------------------------------
  - apiGroups: ["longhorn.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-reader-binding
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: openclaw
roleRef:
  kind: ClusterRole
  name: openclaw-reader
  apiGroup: rbac.authorization.k8s.io
