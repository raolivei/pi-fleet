apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-elder-isolation
  namespace: openclaw
  labels:
    app: openclaw
spec:
  # Restrict ingress to Elder pod
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      app: elder
  ingress:
    # Allow from OpenClaw pod (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app: openclaw
      ports:
        - protocol: TCP
          port: 8000
    # Allow from Traefik ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: traefik
      ports:
        - protocol: TCP
          port: 8000
    # Allow health checks from kube-system (kubelet liveness probes)
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-ingress-only
  namespace: openclaw
  labels:
    app: openclaw
spec:
  # Restrict ingress to OpenClaw pod
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      app: openclaw
  ingress:
    # Allow from Traefik ingress controller only
    - from:
        - namespaceSelector:
            matchLabels:
              name: traefik
      ports:
        - protocol: TCP
          port: 18789
    # Allow health checks from kube-system
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 18789
