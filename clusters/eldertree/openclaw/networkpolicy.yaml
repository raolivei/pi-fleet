apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-elder-isolation
  namespace: openclaw
  labels:
    app: openclaw
spec:
  # Restrict ingress to Elder pod (Control Center API)
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      app: openclaw
      component: elder
  ingress:
    # Allow from OpenClaw pod (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app: openclaw
              component: openclaw
      ports:
        - protocol: TCP
          port: 8006
    # Allow from Traefik ingress controller (runs in kube-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8006
    # Allow health checks from kube-system (kubelet liveness probes)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8006
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-ingress-only
  namespace: openclaw
  labels:
    app: openclaw
spec:
  # Restrict ingress to OpenClaw gateway pod only (not Elder)
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      app: openclaw
      component: openclaw
  ingress:
    # Allow from Traefik ingress controller (runs in kube-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 18789
    # Allow health checks from kube-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 18789
