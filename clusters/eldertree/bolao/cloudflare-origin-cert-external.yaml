# Wildcard *.eldertree.xyz origin cert (Vault: secret/swimto/cloudflare-origin-cert-eldertree)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bolao-cloudflare-origin-cert
  namespace: bolao
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: bolao-cloudflare-origin-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .certificate }}"
        tls.key: "{{ .privatekey }}"
  data:
    - secretKey: certificate
      remoteRef:
        key: secret/swimto/cloudflare-origin-cert-eldertree
        property: certificate
    - secretKey: privatekey
      remoteRef:
        key: secret/swimto/cloudflare-origin-cert-eldertree
        property: private-key
