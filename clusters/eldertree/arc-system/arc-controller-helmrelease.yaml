apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: arc-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: arc-controller
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
  values:
    # Controller settings
    replicaCount: 1

    # Resource limits for controller
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 64Mi

    # Metrics
    metrics:
      controllerManagerAddr: ":8080"
      listenerAddr: ":8080"
      listenerEndpoint: "/metrics"

    # Node placement (stable nodes only)
    nodeSelector:
      eldertree.xyz/node-tier: stable
