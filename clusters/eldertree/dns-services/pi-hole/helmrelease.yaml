apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pi-hole
  namespace: pi-hole
spec:
  interval: 30m
  chart:
    spec:
      chart: ./helm/pi-hole
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  # Longer timeout: Helm waits for LoadBalancer Service to get ingress IP from kube-vip.
  # Under load or slow kube-vip, 5m default can hit "context deadline exceeded".
  install:
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    remediation:
      retries: 3
    timeout: 20m
  values:
    persistence:
      enabled: false
    # Recreate avoids two pods during upgrade (RollingUpdate + maxSurge timed out Helm).
    strategy: Recreate
    service:
      type: LoadBalancer
      loadBalancerClass: null
      loadBalancerIP: 192.168.2.201
    config:
      clusterIP: 192.168.2.201
