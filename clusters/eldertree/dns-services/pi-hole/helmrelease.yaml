apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pi-hole
  namespace: pi-hole
spec:
  interval: 30m
  chart:
    spec:
      chart: ./helm/pi-hole
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  # Longer timeout: Helm waits for LoadBalancer Service to get ingress IP from kube-vip.
  # Under load or slow kube-vip, 5m default can hit "context deadline exceeded".
  install:
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    remediation:
      retries: 3
    timeout: 20m
  values:
    persistence:
      enabled: false
    # Recreate avoids two pods during upgrade (RollingUpdate + maxSurge timed out Helm).
    strategy: Recreate
    service:
      type: LoadBalancer
      # kube-vip.io/kube-vip-class prevents K3s ServiceLB from creating svclb-pi-hole DaemonSet
      # pods that would bind hostPorts 80/443 and block svclb-traefik on all nodes.
      # kube-vip handles the VIP assignment via the kube-vip.io/loadbalancerIPs annotation instead.
      loadBalancerClass: kube-vip.io/kube-vip-class
      loadBalancerIP: 192.168.2.201
    config:
      clusterIP: 192.168.2.201
    # mosher-labs/pihole6-exporter has no arm64 image; disable until arm64 build is available.
    # TODO: re-enable once https://github.com/mosher-labs/pihole6-exporter provides arm64 image.
    monitoring:
      enabled: false
