apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# DNS and networking services
# BIND9 authoritative LAN DNS (eldertree.local + RFC2136), External DNS, Cloudflare Tunnel
resources:
  - bind # BIND9 replaces Pi-hole — adblock unused; see dns-services/bind/README.md (#232)
  - external-dns # Automated DNS record management (RFC2136 LAN + Cloudflare public)
  # - wireguard # WireGuard VPN server for secure remote access (DISABLED)
  - cloudflare-tunnel # Cloudflare Tunnel for secure outbound connections (deployed via Helm)

