apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: swimto-web-scaler
  namespace: swimto
spec:
  scaleTargetRef:
    name: swimto-web
  minReplicaCount: 2 # HA across node-2/3 while node-1 may reboot
  maxReplicaCount: 3
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://monitoring-stack-prometheus-server.observability.svc.cluster.local:80
        metricName: http_requests_per_second
        threshold: "10"
        query: |
          sum(rate(traefik_service_requests_total{
            service=~"swimto-swimto-web-service-3000@kubernetes"
          }[2m]))
