# Dev tracks dev-<timestamp>-<sha> tags produced on every push to the `dev` branch.
# These are emitted by docker-build.yml when ref_name == 'dev'.
# Alphabetical/asc on the timestamp prefix picks the newest build.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: swimto-api-dev-policy
  namespace: swimto-dev
spec:
  imageRepositoryRef:
    name: swimto-api-dev
  filterTags:
    pattern: '^dev-(?P<ts>\d{14})-'
    extract: '$ts'
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: swimto-web-dev-policy
  namespace: swimto-dev
spec:
  imageRepositoryRef:
    name: swimto-web-dev
  filterTags:
    pattern: '^dev-(?P<ts>\d{14})-'
    extract: '$ts'
  policy:
    alphabetical:
      order: asc
