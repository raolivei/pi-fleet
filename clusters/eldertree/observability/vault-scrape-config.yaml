---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-scrape-config
  namespace: observability
  labels:
    app.kubernetes.io/name: vault-scrape-config
    prometheus-scrape-config: "true"
data:
  vault-scrape.yaml: |
    scrape_configs:
      - job_name: 'vault'
        metrics_path: /v1/sys/metrics
        params:
          format: ['prometheus']
        scrape_interval: 60s
        scrape_timeout: 10s
        static_configs:
          - targets:
              - 'vault.vault.svc.cluster.local:8200'
            labels:
              service: vault
              namespace: vault
