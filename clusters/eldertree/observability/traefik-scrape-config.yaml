# Static scrape for Traefik Prometheus metrics (no PodMonitor / Prometheus Operator).
# Traefik must expose the metrics port on its Service; see core-infrastructure/traefik-config.yaml
apiVersion: v1
kind: Secret
metadata:
  name: traefik-scrape-config
  namespace: observability
  labels:
    app.kubernetes.io/name: traefik-scrape-config
    prometheus-scrape-config: "true"
type: Opaque
stringData:
  traefik-scrape.yaml: |
    - job_name: "traefik"
      scrape_interval: 30s
      scrape_timeout: 10s
      metrics_path: /metrics
      static_configs:
        - targets:
            - "traefik.kube-system.svc.cluster.local:9100"
          labels:
            app: traefik
            namespace: kube-system
