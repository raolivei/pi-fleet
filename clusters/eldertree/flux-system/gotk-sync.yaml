# Managed by Flux self-reconciliation (flux-system included in clusters/eldertree/kustomization.yaml).
# Changes here take effect on the next reconcile cycle after merge.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: ssh://git@github.com/raolivei/pi-fleet
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 2m
  path: ./clusters/eldertree
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
