# HelmChartConfig to customize k3s-managed Traefik
# Enables HA with 2 replicas for graceful node drains
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    deployment:
      replicas: 2
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: traefik
              topologyKey: kubernetes.io/hostname
    # Resource limits for Raspberry Pi
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    # Traefik metrics port (9100): do NOT expose on the LoadBalancer service.
    # k3s ServiceLB creates svclb-traefik pods with hostPort for each LB service port; exposing
    # port 9100 on the LB occupies hostPort 9100 on every node, blocking node-exporter DaemonSet
    # (which also needs hostPort 9100) from scheduling.
    # Prometheus scrapes via ClusterIP (traefik.kube-system.svc.cluster.local:9100) — no LB needed.
    ports:
      metrics:
        expose:
          default: false
    metrics:
      prometheus:
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
    # LoadBalancer configuration for kube-vip
    # VIP 192.168.2.200 is assigned by kube-vip on wlan0 interface
    # ServiceLB (svclb pods) handles traffic forwarding to Traefik pods
    service:
      spec:
        loadBalancerIP: 192.168.2.200
