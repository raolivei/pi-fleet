---
# Reconcile node labels/taints from Git (Flux). No manual kubectl required.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: node-scheduling-tier-reconciler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: node-scheduling-tier-reconciler
    app.kubernetes.io/part-of: eldertree
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: node-scheduling-tier-reconciler
        spec:
          serviceAccountName: node-scheduling-reconciler
          restartPolicy: Never
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.33.5
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: node-scheduling-config
              command:
                - /bin/sh
                - -ec
                - |
                  set -e
                  TAINT="${TAINT_KEY}=${TAINT_VALUE}:${TAINT_EFFECT}"

                  kubectl label node "${UNSTABLE_NODE}" "${LABEL_KEY}=unstable" --overwrite
                  kubectl taint nodes "${UNSTABLE_NODE}" "${TAINT}" --overwrite

                  IFS=',' read -ra STABLE_ARRAY <<< "${STABLE_NODES}"
                  for node in "${STABLE_ARRAY[@]}"; do
                    kubectl label node "${node}" "${LABEL_KEY}=stable" --overwrite
                    kubectl taint nodes "${node}" "${TAINT_KEY}-" 2>/dev/null || true
                  done

                  echo "node scheduling tiers reconciled"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
