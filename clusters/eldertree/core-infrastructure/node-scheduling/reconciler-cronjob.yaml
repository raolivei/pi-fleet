---
# Reconcile node labels/taints from Git (Flux). No manual kubectl required.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: node-scheduling-tier-reconciler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: node-scheduling-tier-reconciler
    app.kubernetes.io/part-of: eldertree
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: node-scheduling-tier-reconciler
        spec:
          serviceAccountName: node-scheduling-reconciler
          restartPolicy: Never
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: kubectl
              image: rancher/kubectl:v1.33.5
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -e
                  LABEL_KEY='eldertree.xyz/node-tier'
                  TAINT='eldertree.xyz/prefer-stable-nodes=true:PreferNoSchedule'

                  kubectl label node node-1.eldertree.local "${LABEL_KEY}=unstable" --overwrite
                  kubectl taint nodes node-1.eldertree.local "${TAINT}" --overwrite

                  for n in node-2 node-3; do
                    kubectl label node "${n}.eldertree.local" "${LABEL_KEY}=stable" --overwrite
                    kubectl taint nodes "${n}.eldertree.local" eldertree.xyz/prefer-stable-nodes- 2>/dev/null || true
                  done

                  echo "node scheduling tiers reconciled"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
