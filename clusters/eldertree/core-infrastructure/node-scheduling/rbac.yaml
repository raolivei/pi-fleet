---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-scheduling-reconciler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-scheduling-reconciler
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-scheduling-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-scheduling-reconciler
subjects:
  - kind: ServiceAccount
    name: node-scheduling-reconciler
    namespace: kube-system
