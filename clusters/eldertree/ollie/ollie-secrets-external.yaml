apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ollie-secrets
  namespace: ollie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: ollie-secrets
  data:
    - secretKey: elder-api-key
      remoteRef:
        key: secret/pi-fleet/ollie
        property: elder_api_key
    - secretKey: openrouter-api-key
      remoteRef:
        key: secret/pi-fleet/ollie
        property: openrouter_api_key
