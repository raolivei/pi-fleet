apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollie
  namespace: ollie
spec:
  interval: 30m
  chart:
    spec:
      chart: ./helm/ollie
      version: "0.1.0"
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 30m
  values:
    audio:
      enabled: false
    ollama:
      externalUrl: "http://host.docker.internal:11434"
      deployOnCluster: false
    elder:
      url: "http://elder.openclaw.svc.cluster.local:8000"
    workspace:
      root: "/workspace"
      hostPath: "/mnt/workspace"
    monitoring:
      enabled: true
      port: "8000"
      path: "/metrics"
    core:
      image:
        repository: ghcr.io/raolivei/ollie-core
        tag: v0.4.0
        pullPolicy: Always
      resources:
        requests:
          memory: "512Mi"
          cpu: "200m"
        limits:
          memory: "1Gi"
          cpu: "1000m"
    frontend:
      enabled: false
      image:
        repository: ghcr.io/raolivei/ollie-frontend
        tag: v0.2.0
        pullPolicy: Always
