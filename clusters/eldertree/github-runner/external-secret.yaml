apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-runner-token
  namespace: github-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: github-runner-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/eldertree/github-runner
        property: token
    - secretKey: repo-url
      remoteRef:
        key: secret/eldertree/github-runner
        property: repo-url
