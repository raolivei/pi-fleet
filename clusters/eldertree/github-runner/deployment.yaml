apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: github-runner
  labels:
    app: github-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-1.eldertree.local
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          env:
            - name: RUNNER_NAME
              value: "eldertree-runner-1"
            - name: RUNNER_WORKDIR
              value: "/runner/_work"
            - name: REPO_URL
              valueFrom:
                secretKeyRef:
                  name: github-runner-token
                  key: repo-url
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-runner-token
                  key: token
            - name: LABELS
              value: "self-hosted,Linux,ARM64,eldertree"
            - name: RUNNER_GROUP
              value: "Default"
            - name: DOCKER_HOST
              value: "tcp://localhost:2376"
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: "/certs/client"
          command:
            - /bin/bash
            - -c
            - |
              # Wait for Docker daemon
              timeout=60
              while ! docker info >/dev/null 2>&1; do
                echo "Waiting for Docker daemon..."
                sleep 2
                timeout=$((timeout - 2))
                if [ $timeout -le 0 ]; then
                  echo "Docker daemon did not start in time"
                  exit 1
                fi
              done
              echo "Docker daemon is ready"

              # Configure and start runner
              ./config.sh --url ${REPO_URL} --token ${RUNNER_TOKEN} --name ${RUNNER_NAME} --work ${RUNNER_WORKDIR} --labels ${LABELS} --runnergroup ${RUNNER_GROUP} --unattended --replace

              # Cleanup function
              cleanup() {
                echo "Removing runner..."
                ./config.sh remove --token ${RUNNER_TOKEN}
              }
              trap cleanup EXIT

              # Start runner
              ./run.sh
          volumeMounts:
            - name: workspace
              mountPath: /runner/_work
            - name: docker-certs
              mountPath: /certs
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "3000m"
              memory: "4Gi"
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: "/certs"
          volumeMounts:
            - name: workspace
              mountPath: /runner/_work
            - name: docker-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: runner-workspace
        - name: docker-certs
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
