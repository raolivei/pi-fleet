apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollie-runners
  namespace: arc-runners
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: arc-controller
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-runners
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  dependsOn:
    - name: arc-controller
      namespace: arc-controller
  values:
    # GitHub Configuration
    githubConfigUrl: "https://github.com/raolivei/ollie"
    githubConfigSecret: ollie-runner-github-secret

    # Scaling configuration
    minRunners: 0
    maxRunners: 3

    # Runner configuration
    runnerScaleSetName: "ollie-eldertree"

    # Runner labels (must match workflow runs-on)
    # Jobs with "runs-on: self-hosted" will match this scale set
    runnerGroup: "Default"

    # Container mode with DinD
    containerMode:
      type: "dind"

    # Template for runner pods
    template:
      metadata:
        labels:
          workload-type: ci-cd
      spec:
        # Give runners time to finish jobs before termination
        terminationGracePeriodSeconds: 3600

        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            resources:
              requests:
                cpu: "1000m"
                memory: "2Gi"
              limits:
                cpu: "3000m"
                memory: "4Gi"

    # Controller service account reference
    controllerServiceAccount:
      namespace: arc-controller
      name: arc-controller-gha-rs-controller
