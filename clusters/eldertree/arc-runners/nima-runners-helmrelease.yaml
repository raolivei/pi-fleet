apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nima-runners
  namespace: arc-runners
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: arc-charts
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-runners
  releaseName: nima-runners
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  dependsOn:
    - name: arc-controller
      namespace: arc-controller
  values:
    githubConfigUrl: "https://github.com/raolivei/nima"
    githubConfigSecret: ollie-runner-github-secret

    minRunners: 0
    maxRunners: 2

    runnerScaleSetName: "nima-eldertree"

    scaleSetLabels:
      - self-hosted

    containerMode:
      type: "dind"

    template:
      metadata:
        labels:
          workload-type: ci-cd
      spec:
        nodeSelector:
          eldertree.xyz/node-tier: stable
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: actions.github.com/scale-set-name
                        operator: In
                        values:
                          - nima-eldertree
                  topologyKey: kubernetes.io/hostname
        terminationGracePeriodSeconds: 3600

        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            resources:
              # Lean requests (real CPU usage is low) so 4+ runners fit on stable nodes
              requests:
                cpu: 250m
                memory: 768Mi
              limits:
                cpu: 1500m
                memory: 2Gi
          - name: dind
            resources:
              requests:
                cpu: 100m
                memory: 384Mi
              limits:
                cpu: 1000m
                memory: 1536Mi

    controllerServiceAccount:
      namespace: arc-controller
      name: arc-controller-gha-rs-controller
