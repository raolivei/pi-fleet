apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elder-runners
  namespace: arc-runners
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: arc-charts
        namespace: flux-system
      interval: 12h
  targetNamespace: arc-runners
  releaseName: elder-runners
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  dependsOn:
    - name: arc-controller
      namespace: arc-controller
  values:
    githubConfigUrl: "https://github.com/raolivei/elder"
    githubConfigSecret: ollie-runner-github-secret

    minRunners: 0
    maxRunners: 1

    runnerScaleSetName: "elder-eldertree"

    scaleSetLabels:
      - self-hosted

    containerMode:
      type: "dind"

    template:
      metadata:
        labels:
          workload-type: ci-cd
      spec:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: actions.github.com/scale-set-name
                        operator: In
                        values:
                          - elder-eldertree
                  topologyKey: kubernetes.io/hostname
        terminationGracePeriodSeconds: 3600

        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            resources:
              # Minimal requests — scheduler uses requests; real DinD usage is bursty.
              # node-1 (unstable) used when node-2/3 stable nodes are full.
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1500m
                memory: 2Gi
          - name: dind
            resources:
              # Requests stay minimal (bursty usage); limit raised — 1000m/1536Mi
              # was too tight for the frontend's npm ci+tsc+vite build (esbuild's
              # postinstall spawns a subprocess; under CPU/memory pressure this
              # class of npm bug manifests as "Exit handler never called!").
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 2000m
                memory: 3Gi

    controllerServiceAccount:
      namespace: arc-controller
      name: arc-controller-gha-rs-controller
