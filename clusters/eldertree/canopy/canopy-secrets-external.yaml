---
# ExternalSecret for Canopy application secrets
# Syncs sensitive configuration from Vault to the canopy-secrets Kubernetes secret
#
# Vault paths:
#   - secret/canopy/postgres-password
#   - secret/canopy/secret-key
#   - secret/canopy/questrade-refresh-token (optional)
#   - secret/canopy/wise-api-token (optional)
#
# The database-url is constructed from the postgres-password template.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: canopy-secrets
  namespace: canopy
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: canopy-secrets
    creationPolicy: Owner
    template:
      data:
        # Construct DATABASE_URL from postgres-password
        database-url: "postgresql+psycopg://canopy:{{ .postgresPassword }}@canopy-postgres:5432/canopy"
        postgres-password: "{{ .postgresPassword }}"
        secret-key: "{{ .secretKey }}"
        {{- if .questradeRefreshToken }}
        questrade-refresh-token: "{{ .questradeRefreshToken }}"
        {{- end }}
        {{- if .wiseApiToken }}
        wise-api-token: "{{ .wiseApiToken }}"
        {{- end }}
  data:
    - secretKey: postgresPassword
      remoteRef:
        key: secret/canopy/postgres-password
        property: password
    - secretKey: secretKey
      remoteRef:
        key: secret/canopy/secret-key
        property: key
    # Optional keys - won't fail if missing in Vault
    - secretKey: questradeRefreshToken
      remoteRef:
        key: secret/canopy/questrade-refresh-token
        property: token
    - secretKey: wiseApiToken
      remoteRef:
        key: secret/canopy/wise-api-token
        property: token
