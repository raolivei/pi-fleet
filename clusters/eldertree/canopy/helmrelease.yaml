apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: canopy
  namespace: canopy
spec:
  interval: 30m
  chart:
    spec:
      chart: ./helm/eldertree-app
      version: "0.1.2"
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 12h
  targetNamespace: canopy
  upgrade:
    cleanupOnFail: true
  values:
    # ============================================================
    # Canopy - Personal finance
    # Images: `latest` + pullPolicy Always (single-user; always re-resolve digest).
    # After removing image-automation from Git, delete orphaned Flux image CRs once, e.g.:
    #   kubectl delete imageupdateautomation/canopy-updates -n canopy --ignore-not-found
    #   kubectl delete imagepolicy/canopy-api-policy imagepolicy/canopy-frontend-policy -n canopy --ignore-not-found
    #   kubectl delete imagerepository/canopy-api imagerepository/canopy-frontend -n canopy --ignore-not-found
    # To pin semver + ImageUpdateAutomation again, restore image-automation.yaml from git history.
    # ============================================================

    components:
      canopy-api:
        image:
          repository: ghcr.io/raolivei/canopy-api
          tag: latest
          pullPolicy: Always
        replicas: 2
        port: 8000
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: canopy-secrets
                key: database-url
          - name: REDIS_URL
            value: "redis://canopy-redis:6379/0"
          - name: ENVIRONMENT
            value: "production"
          - name: QUESTRADE_REFRESH_TOKEN
            valueFrom:
              secretKeyRef:
                name: canopy-secrets
                key: questrade-refresh-token
                optional: true
          - name: WISE_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: canopy-secrets
                key: wise-api-token
                optional: true
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        probes:
          path: /v1/health
          liveness: { initialDelaySeconds: 30, periodSeconds: 10 }
          readiness: { initialDelaySeconds: 5, periodSeconds: 5 }

      canopy-frontend:
        image:
          repository: ghcr.io/raolivei/canopy-frontend
          tag: latest
          pullPolicy: Always
        replicas: 2
        port: 3000
        probesEnabled: false
        # Sticky sessions so HTML and _next/static chunk requests hit the same pod (avoids 404s when replicas have different build hashes)
        sessionAffinity: ClientIP
        env:
          - name: NEXT_PUBLIC_API_URL
            value: "http://canopy-api:8000"
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }

      canopy-redis:
        image:
          repository: redis
          tag: 7-alpine
        builtinImage: true
        port: 6379
        probesEnabled: false
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits: { cpu: "100m", memory: "128Mi" }
        volumeMounts:
          - name: redis-data
            mountPath: /data
        volumes:
          - name: redis-data
            emptyDir: {}

    # -- Middleware
    middleware:
      redirect-https:
        type: redirectScheme
        scheme: https
        permanent: true
      canopy-basic-auth:
        type: basicAuth
        secret: canopy-basic-auth

    # -- Ingress
    ingress:
      # --- Local (canopy.eldertree.local) ---
      canopy:
        host: canopy.eldertree.local
        service: canopy-frontend
        port: 3000
        middlewares:
          - canopy-redirect-https@kubernetescrd
          - canopy-canopy-basic-auth@kubernetescrd
        tls:
          secretName: canopy-tls
          certManager: true
        paths:
          - path: /v1
            service: canopy-api
            port: 8000
        annotations:
          external-dns.alpha.kubernetes.io/hostname: canopy.eldertree.local

      # --- Public (canopy.eldertree.xyz) ---
      canopy-public:
        host: canopy.eldertree.xyz
        service: canopy-frontend
        port: 3000
        middlewares:
          - canopy-canopy-basic-auth@kubernetescrd
        tls:
          secretName: canopy-cloudflare-origin-tls
        paths:
          - path: /v1
            service: canopy-api
            port: 8000
        annotations:
          external-dns.alpha.kubernetes.io/exclude: "true"
